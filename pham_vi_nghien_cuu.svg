<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="100%" height="100%">
  <defs>
    <!-- Card Background -->
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    
    <!-- Shadow Filter -->
    <filter id="print-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="100%" height="100%" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" rx="16"/>

  <!-- Grid Pattern -->
  <g opacity="0.02" stroke="#000000" stroke-width="1">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none"/>
    </pattern>
    <rect width="100%" height="100%" fill="url(#grid)" rx="16"/>
  </g>

  <!-- Title & Subtitle -->
  <g>
    <text x="400" y="45" fill="#0f172a" font-family="'Montserrat', 'Inter', sans-serif" font-size="20" font-weight="800" text-anchor="middle" letter-spacing="0.5">PHẠM VI NGHIÊN CỨU ĐỀ TÀI</text>
    <text x="400" y="68" fill="#475569" font-family="'Inter', sans-serif" font-size="12" font-weight="500" text-anchor="middle">Phân giới các chức năng, kỹ thuật trong và ngoài phạm vi đề tài</text>
  </g>

  <!-- Central separator line -->
  <line x1="400" y1="100" x2="400" y2="440" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="8,4"/>

  <!-- Left Card: TRONG PHẠM VI (IN-SCOPE) -->
  <g filter="url(#print-shadow)" transform="translate(40, 100)">
    <rect width="330" height="340" rx="16" fill="url(#card-bg)" stroke="#10b981" stroke-width="2"/>
    <rect width="330" height="46" rx="16" fill="#10b981" opacity="0.05"/>
    
    <!-- Icon Check Circle -->
    <circle cx="30" cy="23" r="8" fill="none" stroke="#10b981" stroke-width="2"/>
    <path d="M 27,23 L 29,25 L 33,21" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    
    <text x="48" y="27" fill="#047857" font-family="'Montserrat', 'Inter', sans-serif" font-size="13" font-weight="700" letter-spacing="0.5">TRONG PHẠM VI NGHIÊN CỨU</text>
    
    <text x="20" y="75" fill="#0f172a" font-family="'Inter', sans-serif" font-size="12" font-weight="700">Về chức năng hệ thống:</text>
    
    <circle cx="25" cy="94" r="3" fill="#10b981"/>
    <text x="36" y="98" fill="#334155" font-family="'Inter', sans-serif" font-size="11">Đăng ký, đăng nhập &amp; phân quyền sử dụng</text>
    
    <circle cx="25" cy="116" r="3" fill="#10b981"/>
    <text x="36" y="120" fill="#334155" font-family="'Inter', sans-serif" font-size="11">Đăng tuyển dụng (Bệnh nhân) &amp; Ứng tuyển (Sinh viên)</text>
    
    <circle cx="25" cy="138" r="3" fill="#10b981"/>
    <text x="36" y="142" fill="#334155" font-family="'Inter', sans-serif" font-size="11">Bộ lọc tìm kiếm tin (theo chuyên khoa, khu vực)</text>
    
    <circle cx="25" cy="160" r="3" fill="#10b981"/>
    <text x="36" y="164" fill="#334155" font-family="'Inter', sans-serif" font-size="11">Nhắn tin trực tiếp &amp; bình luận trao đổi thông tin</text>
    
    <circle cx="25" cy="182" r="3" fill="#10b981"/>
    <text x="36" y="186" fill="#334155" font-family="'Inter', sans-serif" font-size="11">Quản lý đặt lịch hẹn (Appointments) &amp; Đánh giá 2 chiều</text>

    <circle cx="25" cy="204" r="3" fill="#10b981"/>
    <text x="36" y="208" fill="#334155" font-family="'Inter', sans-serif" font-size="11">Hộp thư thông báo &amp; Admin Dashboard quản lý</text>
    
    <text x="20" y="240" fill="#0f172a" font-family="'Inter', sans-serif" font-size="12" font-weight="700">Về kỹ thuật &amp; triển khai:</text>
    
    <circle cx="25" cy="260" r="3" fill="#10b981"/>
    <text x="36" y="264" fill="#334155" font-family="'Inter', sans-serif" font-size="11">Ngôn ngữ backend PHP, cơ sở dữ liệu MySQL</text>
    
    <circle cx="25" cy="282" r="3" fill="#10b981"/>
    <text x="36" y="286" fill="#334155" font-family="'Inter', sans-serif" font-size="11">Giao diện responsive bằng Bootstrap 5</text>
    
    <circle cx="25" cy="304" r="3" fill="#10b981"/>
    <text x="36" y="308" fill="#334155" font-family="'Inter', sans-serif" font-size="11">Vận hành cục bộ trên môi trường XAMPP, Docker</text>
  </g>

  <!-- Right Card: NGOÀI PHẠM VI (OUT-OF-SCOPE) -->
  <g filter="url(#print-shadow)" transform="translate(430, 100)">
    <rect width="330" height="340" rx="16" fill="url(#card-bg)" stroke="#ef4444" stroke-width="2"/>
    <rect width="330" height="46" rx="16" fill="#ef4444" opacity="0.05"/>
    
    <!-- Icon Cross Circle -->
    <circle cx="30" cy="23" r="8" fill="none" stroke="#ef4444" stroke-width="2"/>
    <path d="M 26,19 L 34,27 M 34,19 L 26,27" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
    
    <text x="48" y="27" fill="#b91c1c" font-family="'Montserrat', 'Inter', sans-serif" font-size="13" font-weight="700" letter-spacing="0.5">NGOÀI PHẠM VI NGHIÊN CỨU</text>
    
    <text x="20" y="75" fill="#0f172a" font-family="'Inter', sans-serif" font-size="12" font-weight="700">Không tích hợp các chức năng:</text>
    
    <circle cx="25" cy="94" r="3" fill="#ef4444"/>
    <text x="36" y="98" fill="#334155" font-family="'Inter', sans-serif" font-size="11">Cổng thanh toán điện tử trực tuyến (MoMo, VNPay)</text>
    
    <circle cx="25" cy="116" r="3" fill="#ef4444"/>
    <text x="36" y="120" fill="#334155" font-family="'Inter', sans-serif" font-size="11">Kết nối liên thông với hệ thống của Bệnh viện</text>
    
    <circle cx="25" cy="138" r="3" fill="#ef4444"/>
    <text x="36" y="142" fill="#334155" font-family="'Inter', sans-serif" font-size="11">Video call chẩn đoán chuyên sâu (cần pháp lý y tế)</text>
    
    <circle cx="25" cy="160" r="3" fill="#ef4444"/>
    <text x="36" y="164" fill="#334155" font-family="'Inter', sans-serif" font-size="11">Cơ chế cam kết pháp lý tự động cho giao dịch</text>
    
    <text x="20" y="200" fill="#0f172a" font-family="'Inter', sans-serif" font-size="12" font-weight="700">Giới hạn về kỹ thuật &amp; hạ tầng:</text>
    
    <circle cx="25" cy="220" r="3" fill="#ef4444"/>
    <text x="36" y="224" fill="#334155" font-family="'Inter', sans-serif" font-size="11">Tối ưu lượng truy cập siêu lớn (cân bằng tải)</text>
    
    <circle cx="25" cy="242" r="3" fill="#ef4444"/>
    <text x="36" y="246" fill="#334155" font-family="'Inter', sans-serif" font-size="11">Các giải pháp Caching nâng cao hoặc CDN hạ tầng</text>
    
    <circle cx="25" cy="264" r="3" fill="#ef4444"/>
    <text x="36" y="268" fill="#334155" font-family="'Inter', sans-serif" font-size="11">Triển khai thực tế trên Internet / Server Cloud thương mại</text>

    <text x="20" y="300" fill="#0f172a" font-family="'Inter', sans-serif" font-size="12" font-weight="700">Hạn chế về dữ liệu:</text>
    
    <circle cx="25" cy="318" r="3" fill="#ef4444"/>
    <text x="36" y="322" fill="#334155" font-family="'Inter', sans-serif" font-size="11">Chỉ sử dụng dữ liệu giả lập và dữ liệu kiểm thử thủ công</text>
  </g>
</svg>
