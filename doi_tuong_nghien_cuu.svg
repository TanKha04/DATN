<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="100%" height="100%">
  <defs>
    <!-- Card Background Gradient (Very soft light gray) -->
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>

    <!-- Glowing Drop Shadow for Print -->
    <filter id="print-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background Canvas (Pure White) -->
  <rect width="100%" height="100%" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" rx="16"/>

  <!-- Title & Subtitle (Dark Text) -->
  <g>
    <text x="400" y="45" fill="#0f172a" font-family="'Montserrat', 'Inter', sans-serif" font-size="20" font-weight="800" text-anchor="middle" letter-spacing="0.5">PHÂN TÍCH ĐỐI TƯỢNG NGHIÊN CỨU</text>
    <text x="400" y="68" fill="#475569" font-family="'Inter', sans-serif" font-size="12" font-weight="500" text-anchor="middle">Các tác nhân và hệ thống trong phạm vi nghiên cứu của đề tài</text>
  </g>

  <!-- Connection Arrows -->
  <path d="M 340,180 Q 400,155 460,180" fill="none" stroke="#0284c7" stroke-width="2" stroke-dasharray="6,4"/>
  <path d="M 460,220 Q 400,245 340,220" fill="none" stroke="#7c3aed" stroke-width="2" stroke-dasharray="6,4"/>
  
  <polygon points="463,181 454,175 457,183" fill="#0284c7"/>
  <polygon points="337,219 346,225 343,217" fill="#7c3aed"/>

  <!-- Vertical Connection to Bottom -->
  <line x1="400" y1="225" x2="400" y2="360" stroke="#d97706" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="400,363 395,354 405,354" fill="#d97706"/>

  <!-- Left Card: Bệnh nhân (Patient) -->
  <g filter="url(#print-shadow)" transform="translate(40, 100)">
    <rect width="300" height="210" rx="16" fill="url(#card-bg)" stroke="#0284c7" stroke-width="2"/>
    <rect width="300" height="46" rx="16" fill="#0284c7" opacity="0.05"/>
    
    <!-- Icon Heart/Medical -->
    <path d="M 22,25 C 19,19, 29,15, 32,19 C 35,15, 45,19, 42,25 L 32,35 Z" fill="none" stroke="#0284c7" stroke-width="2" stroke-linejoin="round"/>
    <path d="M 32,22 L 32,28 M 29,25 L 35,25" stroke="#0284c7" stroke-width="1.5" stroke-linecap="round"/>
    
    <text x="56" y="27" fill="#0369a1" font-family="'Montserrat', 'Inter', sans-serif" font-size="13" font-weight="700" letter-spacing="0.5">BỆNH NHÂN &amp; NGƯỜI THÂN</text>
    
    <text x="20" y="70" fill="#0f172a" font-family="'Inter', sans-serif" font-size="12" font-weight="700">Đặc điểm &amp; Nhu cầu:</text>
    <circle cx="25" cy="88" r="3" fill="#0284c7"/>
    <text x="36" y="92" fill="#334155" font-family="'Inter', sans-serif" font-size="11.5">Cần hỗ trợ chăm sóc y tế tại gia đình</text>
    <circle cx="25" cy="108" r="3" fill="#0284c7"/>
    <text x="36" y="112" fill="#334155" font-family="'Inter', sans-serif" font-size="11.5">Người cao tuổi, người bệnh sau phẫu thuật</text>
    
    <text x="20" y="142" fill="#0f172a" font-family="'Inter', sans-serif" font-size="12" font-weight="700">Hành vi nghiên cứu:</text>
    <circle cx="25" cy="160" r="3" fill="#0284c7"/>
    <text x="36" y="164" fill="#334155" font-family="'Inter', sans-serif" font-size="11.5">Cách tìm kiếm, đăng tin kèm bệnh án</text>
    <circle cx="25" cy="180" r="3" fill="#0284c7"/>
    <text x="36" y="184" fill="#334155" font-family="'Inter', sans-serif" font-size="11.5">Giao tiếp, đặt lịch và đánh giá dịch vụ</text>
  </g>

  <!-- Right Card: Sinh viên (Student) -->
  <g filter="url(#print-shadow)" transform="translate(460, 100)">
    <rect width="300" height="210" rx="16" fill="url(#card-bg)" stroke="#7c3aed" stroke-width="2"/>
    <rect width="300" height="46" rx="16" fill="#7c3aed" opacity="0.05"/>
    
    <!-- Icon Graduation Cap -->
    <path d="M 18,22 L 32,15 L 46,22 L 32,29 Z" fill="none" stroke="#6d28d9" stroke-width="2" stroke-linejoin="round"/>
    <path d="M 23,24.5 L 23,30 C 23,33, 41,33, 41,30 L 41,24.5" fill="none" stroke="#6d28d9" stroke-width="2" stroke-linejoin="round"/>
    <path d="M 46,22 L 46,30" fill="none" stroke="#6d28d9" stroke-width="1.5"/>
    
    <text x="56" y="27" fill="#6d28d9" font-family="'Montserrat', 'Inter', sans-serif" font-size="13" font-weight="700" letter-spacing="0.5">SINH VIÊN Y KHOA</text>
    
    <text x="20" y="70" fill="#0f172a" font-family="'Inter', sans-serif" font-size="12" font-weight="700">Đặc điểm &amp; Nhu cầu:</text>
    <circle cx="25" cy="88" r="3" fill="#7c3aed"/>
    <text x="36" y="92" fill="#334155" font-family="'Inter', sans-serif" font-size="11.5">Đang học tại các trường Đại học Y Dược</text>
    <circle cx="25" cy="108" r="3" fill="#7c3aed"/>
    <text x="36" y="112" fill="#334155" font-family="'Inter', sans-serif" font-size="11.5">Nhu cầu thực hành, làm thêm ngoài giờ</text>
    
    <text x="20" y="142" fill="#0f172a" font-family="'Inter', sans-serif" font-size="12" font-weight="700">Hành vi nghiên cứu:</text>
    <circle cx="25" cy="160" r="3" fill="#7c3aed"/>
    <text x="36" y="164" fill="#334155" font-family="'Inter', sans-serif" font-size="11.5">Đăng tin ứng tuyển, xác minh thẻ sinh viên</text>
    <circle cx="25" cy="180" r="3" fill="#7c3aed"/>
    <text x="36" y="184" fill="#334155" font-family="'Inter', sans-serif" font-size="11.5">Trao đổi chuyên môn lâm sàng trực tiếp</text>
  </g>

  <!-- Center Badge (Connecting Node) -->
  <g filter="url(#print-shadow)" transform="translate(340, 190)">
    <rect width="120" height="30" rx="15" fill="#f8fafc" stroke="#475569" stroke-width="1.5"/>
    <text x="60" y="19" fill="#0f172a" font-family="'Montserrat', 'Inter', sans-serif" font-size="9.5" font-weight="800" text-anchor="middle" letter-spacing="0.5">KẾT NỐI HAI CHIỀU</text>
  </g>

  <!-- Bottom Card: Surveys & Comparison -->
  <g filter="url(#print-shadow)" transform="translate(100, 360)">
    <rect width="600" height="130" rx="16" fill="url(#card-bg)" stroke="#d97706" stroke-width="2"/>
    <rect width="600" height="38" rx="16" fill="#d97706" opacity="0.05"/>
    
    <!-- Icon Survey / Search -->
    <circle cx="28" cy="19" r="6" fill="none" stroke="#d97706" stroke-width="2"/>
    <line x1="33" y1="24" x2="39" y2="30" stroke="#d97706" stroke-width="2" stroke-linecap="round"/>
    
    <text x="48" y="23" fill="#b45309" font-family="'Montserrat', 'Inter', sans-serif" font-size="13" font-weight="700" letter-spacing="0.5">KHẢO SÁT SO SÁNH CÁC NỀN TẢNG HIỆN HỮU</text>
    
    <circle cx="22" cy="56" r="3" fill="#d97706"/>
    <text x="34" y="60" fill="#334155" font-family="'Inter', sans-serif" font-size="11.5">Mạng xã hội tự phát (Facebook, Zalo): Kết nối nhanh nhưng thiếu kiểm chứng thẻ sinh viên.</text>
    
    <circle cx="22" cy="78" r="3" fill="#d97706"/>
    <text x="34" y="82" fill="#334155" font-family="'Inter', sans-serif" font-size="11.5">Trang tuyển dụng phổ thông: Không chuyên biệt cho ngành y tế, thiếu cơ chế quản lý lịch hẹn chi tiết.</text>
    
    <!-- Core Resolution Point (Highlighted) -->
    <!-- Green Check Icon -->
    <path d="M 17,105 L 21,109 L 27,101" fill="none" stroke="#15803d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="34" y="107" fill="#15803d" font-family="'Inter', sans-serif" font-size="11.5" font-weight="700">Định hình hướng xây dựng Website Kết Nối Y Tế Chuyên Biệt, An Toàn, Tích Hợp WebRTC &amp; AI.</text>
  </g>
</svg>
