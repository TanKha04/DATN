<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="canvas-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="orange-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="green-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    
    <!-- Shadow Filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.1"/>
    </filter>

    <!-- Arrow Markers -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 6 5 L 0 8.5 z" fill="#475569"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 6 5 L 0 8.5 z" fill="#047857"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 6 5 L 0 8.5 z" fill="#c2410c"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 6 5 L 0 8.5 z" fill="#d97706"/>
    </marker>
  </defs>

  <!-- Background Canvas -->
  <rect width="100%" height="100%" fill="url(#canvas-bg)" stroke="#cbd5e1" stroke-width="1.5" rx="16"/>

  <!-- Grid Pattern -->
  <g opacity="0.02" stroke="#000000" stroke-width="1">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none"/>
    </pattern>
    <rect width="100%" height="100%" fill="url(#grid)" rx="16"/>
  </g>

  <!-- Title -->
  <text x="400" y="45" fill="#0f172a" font-family="'Montserrat', 'Inter', sans-serif" font-size="18" font-weight="800" text-anchor="middle" letter-spacing="0.5">SƠ ĐỒ CƠ CHẾ DỰ PHÒNG CHỊU LỖI (FALLBACK) CỦA TRỢ LÝ AI</text>
  <text x="400" y="65" fill="#475569" font-family="'Inter', sans-serif" font-size="11" font-weight="500" text-anchor="middle">Luồng xử lý từ Client, điều phối API Gemini, Hugging Face và Cơ sở dữ liệu dự phòng cục bộ</text>

  <!-- Connection Lines -->
  
  <!-- 1. Client to Backend -->
  <path d="M 180,135 L 210,135" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- 2. Backend to Gemini call -->
  <path d="M 350,130 L 380,130" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- 3. Gemini Call to Decision -->
  <path d="M 520,130 L 550,130" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- 4. Decision Gemini OK -> Yes (Goes right, then down, then left at the bottom to the response node) -->
  <path d="M 650,130 L 700,130 L 700,490 L 290,490 L 290,470" stroke="#047857" stroke-width="2" stroke-dasharray="4,2" fill="none" marker-end="url(#arrow-green)"/>
  <text x="705" y="190" fill="#047857" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" text-anchor="start">YES (Thành công)</text>
  
  <!-- 5. Decision Gemini OK -> No (Catch Exception) -> Call HF -->
  <path d="M 600,165 L 600,240 L 520,240" stroke="#c2410c" stroke-width="2" fill="none" marker-end="url(#arrow-red)"/>
  <text x="605" y="195" fill="#c2410c" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" text-anchor="start">NO (Lỗi API)</text>

  <!-- 6. HF Call to HF Decision -->
  <path d="M 520,240 L 550,240" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- 7. HF Decision OK -> Yes (Goes down to merge with Gemini YES line) -->
  <path d="M 600,275 L 600,490" stroke="#047857" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <text x="605" y="300" fill="#047857" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" text-anchor="start">YES</text>

  <!-- 8. HF Decision OK -> No -> Call Local Fallback -->
  <path d="M 650,240 L 680,240 L 680,340 L 520,340" stroke="#c2410c" stroke-width="2" fill="none" marker-end="url(#arrow-red)"/>
  <text x="685" y="290" fill="#c2410c" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" text-anchor="start">NO (Hết hạn/Lỗi)</text>

  <!-- 9. Local Fallback to Response Node -->
  <path d="M 380,340 L 290,340 L 290,410" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- 10. Response Node back to Client (Routes cleanly around the left side) -->
  <path d="M 210,440 L 20,440 L 20,135 L 40,135" stroke="#047857" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <text x="30" y="360" fill="#047857" font-family="'Inter', sans-serif" font-size="10.5" font-weight="bold" text-anchor="start">5. Gửi phản hồi JSON</text>

  <!-- 11. Backend Association to Guardrails -->
  <path d="M 210,165 Q 190,165 180,200" stroke="#d97706" stroke-width="1.5" stroke-dasharray="3,3" fill="none" marker-end="url(#arrow-orange)"/>

  <!-- Boxes/Nodes -->
  
  <!-- Client (User Query) -->
  <g filter="url(#shadow)" transform="translate(40, 100)">
    <rect width="140" height="70" rx="10" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
    <text x="70" y="28" fill="#1e40af" font-family="'Montserrat', 'Inter', sans-serif" font-size="11" font-weight="bold" text-anchor="middle">CLIENT</text>
    <text x="70" y="46" fill="#475569" font-family="'Inter', sans-serif" font-size="9.5" text-anchor="middle">1. Gửi câu hỏi y tế</text>
    <text x="70" y="58" fill="#64748b" font-family="'Inter', sans-serif" font-size="8.5" text-anchor="middle">(AJAX POST)</text>
  </g>

  <!-- Backend Controller (PHP dispatcher) -->
  <g filter="url(#shadow)" transform="translate(210, 100)">
    <rect width="140" height="80" rx="10" fill="#ffffff" stroke="#8b5cf6" stroke-width="2"/>
    <text x="70" y="24" fill="#6d28d9" font-family="'Montserrat', 'Inter', sans-serif" font-size="11" font-weight="bold" text-anchor="middle">BACKEND PHP</text>
    <text x="70" y="44" fill="#475569" font-family="'Inter', sans-serif" font-size="9.5" text-anchor="middle">(`ai_gemini.php`)</text>
    <text x="70" y="58" fill="#334155" font-family="'Inter', sans-serif" font-size="8.5" font-style="italic" text-anchor="middle">Try-Catch Block</text>
    <text x="70" y="70" fill="#64748b" font-family="'Inter', sans-serif" font-size="8" text-anchor="middle">Điều phối kết nối</text>
  </g>

  <!-- Call Google Gemini API -->
  <g filter="url(#shadow)" transform="translate(380, 100)">
    <rect width="140" height="60" rx="8" fill="url(#blue-grad)" stroke="#1e40af" stroke-width="1.5"/>
    <text x="70" y="24" fill="#ffffff" font-family="'Montserrat', 'Inter', sans-serif" font-size="10.5" font-weight="bold" text-anchor="middle">GOOGLE GEMINI</text>
    <text x="70" y="40" fill="#bfdbfe" font-family="'Inter', sans-serif" font-size="8.5" text-anchor="middle">Mô hình: gemini-2.5-flash</text>
    <text x="70" y="51" fill="#bfdbfe" font-family="'Inter', sans-serif" font-size="7.5" text-anchor="middle">2. Gửi Prompt + Safety</text>
  </g>

  <!-- Decision: Gemini Success? -->
  <g filter="url(#shadow)" transform="translate(550, 95)">
    <polygon points="50,0 100,35 50,70 0,35" fill="#ffffff" stroke="#475569" stroke-width="1.5"/>
    <text x="50" y="32" fill="#1e293b" font-family="'Inter', sans-serif" font-size="9.5" font-weight="bold" text-anchor="middle">Gemini</text>
    <text x="50" y="44" fill="#1e293b" font-family="'Inter', sans-serif" font-size="9.5" font-weight="bold" text-anchor="middle">Phản hồi?</text>
  </g>

  <!-- Call Hugging Face API -->
  <g filter="url(#shadow)" transform="translate(380, 210)">
    <rect width="140" height="60" rx="8" fill="url(#purple-grad)" stroke="#6d28d9" stroke-width="1.5"/>
    <text x="70" y="24" fill="#ffffff" font-family="'Montserrat', 'Inter', sans-serif" font-size="10.5" font-weight="bold" text-anchor="middle">HUGGING FACE</text>
    <text x="70" y="40" fill="#ddd6fe" font-family="'Inter', sans-serif" font-size="8.5" text-anchor="middle">Mô hình: BlenderBot-400M</text>
    <text x="70" y="51" fill="#ddd6fe" font-family="'Inter', sans-serif" font-size="7.5" text-anchor="middle">3. Dự phòng API call</text>
  </g>

  <!-- Decision: Hugging Face Success? -->
  <g filter="url(#shadow)" transform="translate(550, 205)">
    <polygon points="50,0 100,35 50,70 0,35" fill="#ffffff" stroke="#475569" stroke-width="1.5"/>
    <text x="50" y="32" fill="#1e293b" font-family="'Inter', sans-serif" font-size="9.5" font-weight="bold" text-anchor="middle">Hugging Face</text>
    <text x="50" y="44" fill="#1e293b" font-family="'Inter', sans-serif" font-size="9.5" font-weight="bold" text-anchor="middle">Phản hồi?</text>
  </g>

  <!-- Local Fallback Response (Database / Keyword Matching) -->
  <g filter="url(#shadow)" transform="translate(380, 310)">
    <rect width="140" height="60" rx="8" fill="url(#orange-grad)" stroke="#c2410c" stroke-width="1.5"/>
    <text x="70" y="23" fill="#ffffff" font-family="'Montserrat', 'Inter', sans-serif" font-size="10.5" font-weight="bold" text-anchor="middle">LOCAL FALLBACK</text>
    <text x="70" y="38" fill="#ffedd5" font-family="'Inter', sans-serif" font-size="8.5" text-anchor="middle">`getLocalFallbackResponse()`</text>
    <text x="70" y="49" fill="#ffedd5" font-family="'Inter', sans-serif" font-size="7.5" text-anchor="middle">4. Khớp từ khóa offline</text>
  </g>

  <!-- Final JSON response parser -->
  <g filter="url(#shadow)" transform="translate(210, 410)">
    <rect width="160" height="60" rx="8" fill="url(#green-grad)" stroke="#047857" stroke-width="1.5"/>
    <text x="80" y="24" fill="#ffffff" font-family="'Montserrat', 'Inter', sans-serif" font-size="10.5" font-weight="bold" text-anchor="middle">KẾT QUẢ PHẢN HỒI</text>
    <text x="80" y="39" fill="#a7f3d0" font-family="'Inter', sans-serif" font-size="8.5" text-anchor="middle">Đóng gói JSON phản hồi</text>
    <text x="80" y="49" fill="#a7f3d0" font-family="'Inter', sans-serif" font-size="7.5" text-anchor="middle">Lọc an toàn cuối cùng</text>
  </g>

  <!-- Medical Guardrails policy info block -->
  <g filter="url(#shadow)" transform="translate(40, 200)">
    <rect width="140" height="110" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
    <text x="70" y="22" fill="#92400e" font-family="'Montserrat', 'Inter', sans-serif" font-size="10" font-weight="bold" text-anchor="middle">Rào cản y tế:</text>
    <text x="70" y="42" fill="#b45309" font-family="'Inter', sans-serif" font-size="8.5" text-anchor="middle">• Từ chối kê đơn thuốc</text>
    <text x="70" y="57" fill="#b45309" font-family="'Inter', sans-serif" font-size="8.5" text-anchor="middle">• Lọc chủ đề y tế</text>
    <text x="70" y="72" fill="#b45309" font-family="'Inter', sans-serif" font-size="8.5" text-anchor="middle">• Giao thức triệu chứng</text>
    <text x="70" y="87" fill="#b45309" font-family="'Inter', sans-serif" font-size="8.5" text-anchor="middle">  nguy kịch (115 Red Flags)</text>
  </g>
</svg>
