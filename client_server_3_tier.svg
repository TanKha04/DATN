<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Card Background -->
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    
    <!-- Shadow Filter -->
    <filter id="print-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="100%" height="100%" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" rx="16"/>

  <!-- Grid Pattern -->
  <g opacity="0.02" stroke="#000000" stroke-width="1">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none"/>
    </pattern>
    <rect width="100%" height="100%" fill="url(#grid)" rx="16"/>
  </g>

  <!-- Title -->
  <text x="400" y="45" fill="#0f172a" font-family="'Montserrat', 'Inter', sans-serif" font-size="18" font-weight="800" text-anchor="middle" letter-spacing="0.5">MÔ HÌNH KIẾN TRÚC CLIENT - SERVER 3 TẦNG</text>
  <text x="400" y="65" fill="#475569" font-family="'Inter', sans-serif" font-size="11" font-weight="500" text-anchor="middle">Luồng giao tiếp dữ liệu giữa Client, Web Server và Database</text>

  <!-- Arrows and Labels -->
  <!-- Client to Server Request -->
  <path d="M 230,170 L 320,170" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow-client)" stroke-dasharray="5,3"/>
  <text x="275" y="157" fill="#0369a1" font-family="'Inter', sans-serif" font-size="9.5" font-weight="bold" text-anchor="middle">1. HTTP Request</text>
  <text x="275" y="180" fill="#64748b" font-family="'Inter', sans-serif" font-size="8.5" text-anchor="middle">(GET, POST...)</text>

  <!-- Server to Client Response -->
  <path d="M 320,280 L 230,280" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-server)" stroke-dasharray="5,3"/>
  <text x="275" y="267" fill="#6d28d9" font-family="'Inter', sans-serif" font-size="9.5" font-weight="bold" text-anchor="middle">4. HTTP Response</text>
  <text x="275" y="290" fill="#64748b" font-family="'Inter', sans-serif" font-size="8.5" text-anchor="middle">(HTML, JSON)</text>

  <!-- Server to DB Request -->
  <path d="M 510,170 L 600,170" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-server)" stroke-dasharray="5,3"/>
  <text x="555" y="157" fill="#6d28d9" font-family="'Inter', sans-serif" font-size="9.5" font-weight="bold" text-anchor="middle">2. SQL Query</text>
  <text x="555" y="180" fill="#64748b" font-family="'Inter', sans-serif" font-size="8.5" text-anchor="middle">(PDO Prepared)</text>

  <!-- DB to Server Response -->
  <path d="M 600,280 L 510,280" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-db)" stroke-dasharray="5,3"/>
  <text x="555" y="267" fill="#047857" font-family="'Inter', sans-serif" font-size="9.5" font-weight="bold" text-anchor="middle">3. Data Results</text>
  <text x="555" y="290" fill="#64748b" font-family="'Inter', sans-serif" font-size="8.5" text-anchor="middle">(Recordset/Array)</text>

  <!-- Markers -->
  <svg>
    <defs>
      <marker id="arrow-client" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 2 L 5 5 L 0 8 z" fill="#0284c7"/>
      </marker>
      <marker id="arrow-server" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 2 L 5 5 L 0 8 z" fill="#7c3aed"/>
      </marker>
      <marker id="arrow-db" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 2 L 5 5 L 0 8 z" fill="#10b981"/>
      </marker>
    </defs>
  </svg>

  <!-- Box 1: Client (Presentation Layer) -->
  <g filter="url(#print-shadow)" transform="translate(40, 110)">
    <rect width="180" height="230" rx="14" fill="url(#card-bg)" stroke="#0284c7" stroke-width="2"/>
    <rect width="180" height="35" rx="14" fill="#0284c7" opacity="0.05"/>
    
    <!-- Icon Browser -->
    <rect x="15" y="10" width="18" height="14" rx="2" fill="none" stroke="#0284c7" stroke-width="1.5"/>
    <circle cx="19" cy="14" r="1" fill="#0284c7"/>
    <circle cx="23" cy="14" r="1" fill="#0284c7"/>
    
    <text x="40" y="22" fill="#0369a1" font-family="'Montserrat', 'Inter', sans-serif" font-size="11" font-weight="800">CLIENT LAYER</text>
    
    <text x="15" y="65" fill="#0f172a" font-family="'Inter', sans-serif" font-size="10.5" font-weight="700">Trình duyệt Web:</text>
    <text x="15" y="85" fill="#334155" font-family="'Inter', sans-serif" font-size="10">- Chrome, Firefox, Safari...</text>
    
    <text x="15" y="115" fill="#0f172a" font-family="'Inter', sans-serif" font-size="10.5" font-weight="700">Công nghệ giao diện:</text>
    <text x="15" y="135" fill="#334155" font-family="'Inter', sans-serif" font-size="10">- HTML5 thô, CSS3 thô</text>
    <text x="15" y="155" fill="#334155" font-family="'Inter', sans-serif" font-size="10">- JS ES6, Bootstrap 5</text>
    <text x="15" y="175" fill="#334155" font-family="'Inter', sans-serif" font-size="10">- Tương tác động AJAX</text>
    <text x="15" y="195" fill="#334155" font-family="'Inter', sans-serif" font-size="10">- Cửa sổ Popup (Modal)</text>
  </g>

  <!-- Box 2: Application Server (Business Logic Layer) -->
  <g filter="url(#print-shadow)" transform="translate(330, 110)">
    <rect width="170" height="230" rx="14" fill="url(#card-bg)" stroke="#7c3aed" stroke-width="2"/>
    <rect width="170" height="35" rx="14" fill="#7c3aed" opacity="0.05"/>
    
    <!-- Icon Server -->
    <circle cx="23" cy="18" r="4" fill="none" stroke="#6d28d9" stroke-width="1.5"/>
    <path d="M 23,22 L 23,26" stroke="#6d28d9" stroke-width="1.5"/>
    
    <text x="40" y="22" fill="#6d28d9" font-family="'Montserrat', 'Inter', sans-serif" font-size="11" font-weight="800">LOGIC LAYER</text>
    
    <text x="15" y="65" fill="#0f172a" font-family="'Inter', sans-serif" font-size="10.5" font-weight="700">Máy chủ ứng dụng:</text>
    <text x="15" y="85" fill="#334155" font-family="'Inter', sans-serif" font-size="10">- Apache Web Server</text>
    <text x="15" y="105" fill="#334155" font-family="'Inter', sans-serif" font-size="10">- Môi trường PHP 8.1</text>
    
    <text x="15" y="135" fill="#0f172a" font-family="'Inter', sans-serif" font-size="10.5" font-weight="700">Nghiệp vụ xử lý:</text>
    <text x="15" y="155" fill="#334155" font-family="'Inter', sans-serif" font-size="10">- Phân biệt email y tế</text>
    <text x="15" y="175" fill="#334155" font-family="'Inter', sans-serif" font-size="10">- Quản lý Session</text>
    <text x="15" y="195" fill="#334155" font-family="'Inter', sans-serif" font-size="10">- Mã hóa bcrypt mật khẩu</text>
    <text x="15" y="215" fill="#334155" font-family="'Inter', sans-serif" font-size="10">- Các endpoint API JSON</text>
  </g>

  <!-- Box 3: Database Server (Data Access Layer) -->
  <g filter="url(#print-shadow)" transform="translate(610, 110)">
    <rect width="150" height="230" rx="14" fill="url(#card-bg)" stroke="#10b981" stroke-width="2"/>
    <rect width="150" height="35" rx="14" fill="#10b981" opacity="0.05"/>
    
    <!-- Icon Cylinder/DB -->
    <ellipse cx="25" cy="18" rx="7" ry="3" fill="none" stroke="#047857" stroke-width="1.5"/>
    <path d="M 18,18 L 18,28 A 7,3 0 0,0 32,28 L 32,18" fill="none" stroke="#047857" stroke-width="1.5"/>
    
    <text x="40" y="22" fill="#047857" font-family="'Montserrat', 'Inter', sans-serif" font-size="11" font-weight="800">DATA LAYER</text>
    
    <text x="15" y="65" fill="#0f172a" font-family="'Inter', sans-serif" font-size="10.5" font-weight="700">Hệ quản trị CSDL:</text>
    <text x="15" y="85" fill="#334155" font-family="'Inter', sans-serif" font-size="10">- MySQL CSDL 8.0</text>
    
    <text x="15" y="115" fill="#0f172a" font-family="'Inter', sans-serif" font-size="10.5" font-weight="700">Liên kết kết nối:</text>
    <text x="15" y="135" fill="#334155" font-family="'Inter', sans-serif" font-size="10">- Thư viện PHP PDO</text>
    <text x="15" y="155" fill="#334155" font-family="'Inter', sans-serif" font-size="10">- Prepared Statements</text>
    <text x="15" y="175" fill="#334155" font-family="'Inter', sans-serif" font-size="10">- Chống SQL Injection</text>
    <text x="15" y="195" fill="#334155" font-family="'Inter', sans-serif" font-size="10">- Lưu trữ bảng Users...</text>
  </g>
</svg>
