<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="100%" height="100%">
  <defs>
    <!-- Card Background -->
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    
    <!-- Shadow Filter -->
    <filter id="print-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="100%" height="100%" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" rx="16"/>

  <!-- Grid Pattern -->
  <g opacity="0.02" stroke="#000000" stroke-width="1">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none"/>
    </pattern>
    <rect width="100%" height="100%" fill="url(#grid)" rx="16"/>
  </g>

  <!-- Title & Subtitle -->
  <g>
    <text x="400" y="40" fill="#0f172a" font-family="'Montserrat', 'Inter', sans-serif" font-size="20" font-weight="800" text-anchor="middle" letter-spacing="0.5">KIẾN TRÚC HỆ THỐNG &amp; CÔNG NGHỆ SỬ DỤNG</text>
    <text x="400" y="62" fill="#475569" font-family="'Inter', sans-serif" font-size="12" font-weight="500" text-anchor="middle">Mô hình Client-Server 3 tầng tích hợp giải pháp nâng cao</text>
  </g>

  <!-- Flow Arrows between Left Layers -->
  <g stroke="#475569" stroke-width="1.5" fill="none">
    <!-- Pres to Logic -->
    <path d="M 280,185 L 280,205" marker-end="url(#arrow)"/>
    <path d="M 320,205 L 320,185" marker-end="url(#arrow)"/>
    
    <!-- Logic to Data -->
    <path d="M 280,315 L 280,335" marker-end="url(#arrow)"/>
    <path d="M 320,335 L 320,315" marker-end="url(#arrow)"/>
  </g>

  <!-- Marker definition for arrows -->
  <svg>
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 2 L 5 5 L 0 8 z" fill="#475569"/>
      </marker>
    </defs>
  </svg>

  <!-- LAYER 1: PRESENTATION LAYER (Tầng Trình Diễn) -->
  <g filter="url(#print-shadow)" transform="translate(40, 90)">
    <rect width="530" height="90" rx="14" fill="url(#card-bg)" stroke="#0284c7" stroke-width="2"/>
    <rect width="530" height="30" rx="14" fill="#0284c7" opacity="0.05"/>
    <text x="15" y="20" fill="#0369a1" font-family="'Montserrat', 'Inter', sans-serif" font-size="11" font-weight="800" letter-spacing="0.5">TẦNG TRÌNH DIỄN (PRESENTATION LAYER)</text>
    
    <g transform="translate(15, 42)">
      <rect x="0" y="0" width="150" height="36" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
      <text x="75" y="22" fill="#334155" font-family="'Inter', sans-serif" font-size="11" text-anchor="middle" font-weight="700">HTML5, CSS3, JavaScript</text>
      
      <rect x="165" y="0" width="160" height="36" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
      <text x="245" y="22" fill="#334155" font-family="'Inter', sans-serif" font-size="11" text-anchor="middle" font-weight="700">Bootstrap 5.3 Framework</text>

      <rect x="340" y="0" width="160" height="36" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
      <text x="420" y="22" fill="#334155" font-family="'Inter', sans-serif" font-size="11" text-anchor="middle" font-weight="700">Trình duyệt Web (Client)</text>
    </g>
  </g>

  <!-- LAYER 2: BUSINESS LOGIC LAYER (Tầng Nghiệp Vụ) -->
  <g filter="url(#print-shadow)" transform="translate(40, 210)">
    <rect width="530" height="110" rx="14" fill="url(#card-bg)" stroke="#7c3aed" stroke-width="2"/>
    <rect width="530" height="30" rx="14" fill="#7c3aed" opacity="0.05"/>
    <text x="15" y="20" fill="#6d28d9" font-family="'Montserrat', 'Inter', sans-serif" font-size="11" font-weight="800" letter-spacing="0.5">TẦNG NGHIỆP VỤ (BUSINESS LOGIC LAYER)</text>
    
    <g transform="translate(15, 42)">
      <rect x="0" y="0" width="120" height="52" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
      <text x="60" y="22" fill="#334155" font-family="'Inter', sans-serif" font-size="11" text-anchor="middle" font-weight="700">PHP 8.1 Backend</text>
      <text x="60" y="38" fill="#64748b" font-family="'Inter', sans-serif" font-size="9" text-anchor="middle">Session &amp; Logic</text>

      <rect x="130" y="0" width="120" height="52" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
      <text x="190" y="22" fill="#334155" font-family="'Inter', sans-serif" font-size="11" text-anchor="middle" font-weight="700">WebRTC Peer Call</text>
      <text x="190" y="38" fill="#64748b" font-family="'Inter', sans-serif" font-size="9" text-anchor="middle">Signaling &amp; Video</text>

      <rect x="260" y="0" width="120" height="52" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
      <text x="320" y="22" fill="#334155" font-family="'Inter', sans-serif" font-size="11" text-anchor="middle" font-weight="700">Trợ Lý Ảo AI</text>
      <text x="320" y="38" fill="#64748b" font-family="'Inter', sans-serif" font-size="9" text-anchor="middle">Gemini/HF APIs</text>

      <rect x="390" y="0" width="110" height="52" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
      <text x="445" y="22" fill="#334155" font-family="'Inter', sans-serif" font-size="11" text-anchor="middle" font-weight="700">RESTful API</text>
      <text x="445" y="38" fill="#64748b" font-family="'Inter', sans-serif" font-size="9" text-anchor="middle">JSON Endpoints</text>
    </g>
  </g>

  <!-- LAYER 3: DATA ACCESS LAYER (Tầng Dữ Liệu) -->
  <g filter="url(#print-shadow)" transform="translate(40, 350)">
    <rect width="530" height="90" rx="14" fill="url(#card-bg)" stroke="#10b981" stroke-width="2"/>
    <rect width="530" height="30" rx="14" fill="#10b981" opacity="0.05"/>
    <text x="15" y="20" fill="#047857" font-family="'Montserrat', 'Inter', sans-serif" font-size="11" font-weight="800" letter-spacing="0.5">TẦNG DỮ LIỆU (DATA ACCESS LAYER)</text>
    
    <g transform="translate(15, 42)">
      <rect x="0" y="0" width="240" height="36" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
      <text x="120" y="22" fill="#334155" font-family="'Inter', sans-serif" font-size="11" text-anchor="middle" font-weight="700">Hệ CSDL MySQL 8.0 (Users, Posts...)</text>
      
      <rect x="260" y="0" width="240" height="36" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
      <text x="380" y="22" fill="#334155" font-family="'Inter', sans-serif" font-size="11" text-anchor="middle" font-weight="700">Kết nối PDO (Prepared Statements)</text>
    </g>
  </g>

  <!-- SIDE LAYER: DEVOPS & TOOLS (Công Cụ & Hạ Tầng) -->
  <g filter="url(#print-shadow)" transform="translate(600, 90)">
    <rect width="160" height="350" rx="14" fill="url(#card-bg)" stroke="#d97706" stroke-width="2"/>
    <rect width="160" height="30" rx="14" fill="#d97706" opacity="0.05"/>
    <text x="80" y="20" fill="#b45309" font-family="'Montserrat', 'Inter', sans-serif" font-size="10.5" font-weight="800" text-anchor="middle" letter-spacing="0.5">CÔNG CỤ &amp; HẠ TẦNG</text>
    
    <g transform="translate(15, 45)">
      <rect x="0" y="0" width="130" height="56" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
      <text x="65" y="24" fill="#334155" font-family="'Inter', sans-serif" font-size="11" text-anchor="middle" font-weight="700">Docker</text>
      <text x="65" y="42" fill="#64748b" font-family="'Inter', sans-serif" font-size="9.5" text-anchor="middle">Ảo hóa Container</text>
      
      <rect x="0" y="72" width="130" height="56" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
      <text x="65" y="24" fill="#334155" font-family="'Inter', sans-serif" font-size="11" text-anchor="middle" font-weight="700">Postman</text>
      <text x="65" y="42" fill="#64748b" font-family="'Inter', sans-serif" font-size="9.5" text-anchor="middle">Kiểm thử API</text>

      <rect x="0" y="144" width="130" height="56" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
      <text x="65" y="24" fill="#334155" font-family="'Inter', sans-serif" font-size="11" text-anchor="middle" font-weight="700">Git &amp; GitHub</text>
      <text x="65" y="42" fill="#64748b" font-family="'Inter', sans-serif" font-size="9.5" text-anchor="middle">Quản lý mã nguồn</text>

      <rect x="0" y="216" width="130" height="56" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
      <text x="65" y="24" fill="#334155" font-family="'Inter', sans-serif" font-size="11" text-anchor="middle" font-weight="700">XAMPP</text>
      <text x="65" y="42" fill="#64748b" font-family="'Inter', sans-serif" font-size="9.5" text-anchor="middle">Apache &amp; MySQL local</text>
    </g>
  </g>
</svg>
