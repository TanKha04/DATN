<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Card Background -->
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    
    <!-- Shadow Filter -->
    <filter id="print-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="100%" height="100%" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" rx="16"/>

  <!-- Grid Pattern -->
  <g opacity="0.02" stroke="#000000" stroke-width="1">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none"/>
    </pattern>
    <rect width="100%" height="100%" fill="url(#grid)" rx="16"/>
  </g>

  <!-- Title -->
  <text x="400" y="45" fill="#0f172a" font-family="'Montserrat', 'Inter', sans-serif" font-size="18" font-weight="800" text-anchor="middle" letter-spacing="0.5">QUY TRÌNH XÁC THỰC PHIÊN LÀM VIỆC (SESSION AUTHENTICATION)</text>
  <text x="400" y="65" fill="#475569" font-family="'Inter', sans-serif" font-size="11" font-weight="500" text-anchor="middle">Mã hóa Session ID phía Client và lưu trữ trạng thái người dùng trên Server</text>

  <!-- Swimlanes / Lifelines -->
  <g stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="8,4">
    <line x1="200" y1="130" x2="200" y2="400" />
    <line x1="600" y1="130" x2="600" y2="400" />
  </g>

  <!-- Lifeline Labels -->
  <rect x="120" y="100" width="160" height="30" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="200" y="119" fill="#0369a1" font-family="'Montserrat', 'Inter', sans-serif" font-weight="bold" font-size="11" text-anchor="middle">CLIENT (BROWSER)</text>

  <rect x="520" y="100" width="160" height="30" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="600" y="119" fill="#6d28d9" font-family="'Montserrat', 'Inter', sans-serif" font-weight="bold" font-size="11" text-anchor="middle">SERVER (PHP ENGINE)</text>

  <!-- STEP 1: Login Request -->
  <path d="M 200,160 L 600,160" stroke="#d97706" stroke-width="2" marker-end="url(#arrow-orange)" stroke-dasharray="5,3"/>
  <text x="400" y="148" fill="#b45309" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" text-anchor="middle">1. Gửi thông tin Đăng nhập (POST /login)</text>
  <text x="400" y="175" fill="#334155" font-family="'Courier New', monospace" font-size="9" text-anchor="middle">username &amp; password (mã hóa bcrypt)</text>

  <!-- STEP 2: Session Creation (Server Box) -->
  <rect x="540" y="190" width="120" height="40" rx="6" fill="#ffffff" stroke="#10b981" stroke-width="1.5"/>
  <text x="600" y="208" fill="#047857" font-family="'Inter', sans-serif" font-weight="bold" font-size="9.5" text-anchor="middle">Khởi tạo Session</text>
  <text x="600" y="222" fill="#475569" font-family="'Inter', sans-serif" font-size="8" text-anchor="middle">Lưu user_id, role, name</text>

  <!-- STEP 3: Cookie Response -->
  <path d="M 600,250 L 200,250" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow-cyan)" stroke-dasharray="5,3"/>
  <text x="400" y="238" fill="#0369a1" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" text-anchor="middle">2. Trả về Cookie chứa Session ID</text>
  <text x="400" y="266" fill="#334155" font-family="'Courier New', monospace" font-size="9" text-anchor="middle">Set-Cookie: PHPSESSID=xyz123... (ngẫu nhiên)</text>

  <!-- STEP 4: Next request with Cookie -->
  <path d="M 200,310 L 600,310" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-purple)" stroke-dasharray="5,3"/>
  <text x="400" y="298" fill="#6d28d9" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" text-anchor="middle">3. Các Request tiếp theo đính kèm Cookie</text>
  <text x="400" y="326" fill="#334155" font-family="'Courier New', monospace" font-size="9" text-anchor="middle">Cookie: PHPSESSID=xyz123...</text>

  <!-- STEP 5: Verification and Response -->
  <rect x="540" y="340" width="120" height="40" rx="6" fill="#ffffff" stroke="#db2777" stroke-width="1.5"/>
  <text x="600" y="358" fill="#be185d" font-family="'Inter', sans-serif" font-weight="bold" font-size="9.5" text-anchor="middle">Verify Session ID</text>
  <text x="600" y="372" fill="#475569" font-family="'Inter', sans-serif" font-size="8" text-anchor="middle">Đối chiếu và cấp quyền</text>

  <!-- Response flow -->
  <path d="M 600,390 L 200,390" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-green)" stroke-dasharray="5,3"/>
  <text x="400" y="382" fill="#047857" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" text-anchor="middle">4. Cho phép truy cập dữ liệu bảo mật</text>

  <!-- Markers -->
  <svg>
    <defs>
      <marker id="arrow-orange" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 2 L 5 5 L 0 8 z" fill="#d97706"/>
      </marker>
      <marker id="arrow-cyan" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 2 L 5 5 L 0 8 z" fill="#0284c7"/>
      </marker>
      <marker id="arrow-purple" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 2 L 5 5 L 0 8 z" fill="#7c3aed"/>
      </marker>
      <marker id="arrow-green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 2 L 5 5 L 0 8 z" fill="#10b981"/>
      </marker>
    </defs>
  </svg>
</svg>
