<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="canvas-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>

    <!-- Card Backgrounds -->
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>

    <!-- Shadows -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="100%" height="100%" fill="url(#canvas-bg)" stroke="#cbd5e1" stroke-width="1.5" rx="16"/>

  <!-- Grid Pattern -->
  <g opacity="0.02" stroke="#000000" stroke-width="1">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none"/>
    </pattern>
    <rect width="100%" height="100%" fill="url(#grid)" rx="16"/>
  </g>

  <!-- Title -->
  <text x="400" y="45" fill="#0f172a" font-family="'Montserrat', 'Inter', sans-serif" font-size="18" font-weight="800" text-anchor="middle" letter-spacing="0.5">SO SÁNH KIẾN TRÚC MÁY ẢO (VM) VÀ CONTAINER (DOCKER)</text>
  <text x="400" y="65" fill="#475569" font-family="'Inter', sans-serif" font-size="11" font-weight="500" text-anchor="middle">Sự khác biệt về hiệu năng, tài nguyên thông qua việc chia sẻ nhân hệ điều hành (Kernel sharing)</text>

  <!-- SECTION LEFT: MÁY ẢO (VIRTUAL MACHINE) -->
  <g filter="url(#shadow)" transform="translate(40, 95)">
    <!-- Boundary Box -->
    <rect width="340" height="330" rx="14" fill="url(#card-bg)" stroke="#ef4444" stroke-width="1.5"/>
    <rect width="340" height="35" rx="14" fill="#ef4444" opacity="0.05"/>
    <text x="170" y="23" fill="#dc2626" font-family="'Montserrat', 'Inter', sans-serif" font-size="12" font-weight="bold" text-anchor="middle">KIẾN TRÚC MÁY ẢO (VM)</text>

    <!-- Layers of VM -->
    <!-- 1. Infrastructure -->
    <rect x="20" y="270" width="300" height="40" rx="6" fill="#475569" stroke="#334155" stroke-width="1.5"/>
    <text x="170" y="295" fill="#ffffff" font-family="'Montserrat', 'Inter', sans-serif" font-size="10.5" font-weight="bold" text-anchor="middle">Hạ tầng vật lý (CPU, RAM, HDD...)</text>

    <!-- 2. Host OS -->
    <rect x="20" y="220" width="300" height="40" rx="6" fill="#64748b" stroke="#475569" stroke-width="1.5"/>
    <text x="170" y="245" fill="#ffffff" font-family="'Montserrat', 'Inter', sans-serif" font-size="10.5" font-weight="bold" text-anchor="middle">Hệ điều hành máy chủ (Host OS)</text>

    <!-- 3. Hypervisor -->
    <rect x="20" y="170" width="300" height="40" rx="6" fill="#f59e0b" stroke="#d97706" stroke-width="1.5"/>
    <text x="170" y="195" fill="#ffffff" font-family="'Montserrat', 'Inter', sans-serif" font-size="10.5" font-weight="bold" text-anchor="middle">Hypervisor (Ảo hóa phần cứng)</text>

    <!-- 4. Virtual Machine 1 & 2 -->
    <!-- VM 1 -->
    <g transform="translate(20, 55)">
      <rect width="140" height="105" rx="6" fill="#f8fafc" stroke="#3b82f6" stroke-width="1.5"/>
      <rect width="140" height="25" rx="6" fill="#3b82f6"/>
      <text x="70" y="17" fill="#ffffff" font-family="'Inter', sans-serif" font-size="9.5" font-weight="bold" text-anchor="middle">Virtual Machine 1</text>
      
      <!-- Guest OS -->
      <rect x="10" y="35" width="120" height="30" rx="4" fill="#93c5fd" stroke="#2563eb" stroke-width="1"/>
      <text x="70" y="53" fill="#1e3a8a" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" text-anchor="middle">HĐH Khách (Guest OS)</text>
      
      <!-- App 1 -->
      <rect x="10" y="72" width="120" height="25" rx="4" fill="#bfdbfe" stroke="#1d4ed8" stroke-width="1"/>
      <text x="70" y="88" fill="#1e3a8a" font-family="'Inter', sans-serif" font-size="9" text-anchor="middle">Ứng dụng A (App)</text>
    </g>

    <!-- VM 2 -->
    <g transform="translate(180, 55)">
      <rect width="140" height="105" rx="6" fill="#f8fafc" stroke="#10b981" stroke-width="1.5"/>
      <rect width="140" height="25" rx="6" fill="#10b981"/>
      <text x="70" y="17" fill="#ffffff" font-family="'Inter', sans-serif" font-size="9.5" font-weight="bold" text-anchor="middle">Virtual Machine 2</text>
      
      <!-- Guest OS -->
      <rect x="10" y="35" width="120" height="30" rx="4" fill="#a7f3d0" stroke="#059669" stroke-width="1"/>
      <text x="70" y="53" fill="#064e3b" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" text-anchor="middle">HĐH Khách (Guest OS)</text>
      
      <!-- App 2 -->
      <rect x="10" y="72" width="120" height="25" rx="4" fill="#d1fae5" stroke="#047857" stroke-width="1"/>
      <text x="70" y="88" fill="#064e3b" font-family="'Inter', sans-serif" font-size="9" text-anchor="middle">Ứng dụng B (App)</text>
    </g>
  </g>

  <!-- SECTION RIGHT: CONTAINER (DOCKER) -->
  <g filter="url(#shadow)" transform="translate(420, 95)">
    <!-- Boundary Box -->
    <rect width="340" height="330" rx="14" fill="url(#card-bg)" stroke="#0284c7" stroke-width="1.5"/>
    <rect width="340" height="35" rx="14" fill="#0284c7" opacity="0.05"/>
    <text x="170" y="23" fill="#0284c7" font-family="'Montserrat', 'Inter', sans-serif" font-size="12" font-weight="bold" text-anchor="middle">KIẾN TRÚC CONTAINER (DOCKER)</text>

    <!-- Layers of Docker -->
    <!-- 1. Infrastructure -->
    <rect x="20" y="270" width="300" height="40" rx="6" fill="#475569" stroke="#334155" stroke-width="1.5"/>
    <text x="170" y="295" fill="#ffffff" font-family="'Montserrat', 'Inter', sans-serif" font-size="10.5" font-weight="bold" text-anchor="middle">Hạ tầng vật lý (CPU, RAM, HDD...)</text>

    <!-- 2. Host OS (Shared Kernel) -->
    <rect x="20" y="220" width="300" height="40" rx="6" fill="#64748b" stroke="#475569" stroke-width="1.5"/>
    <text x="170" y="245" fill="#ffffff" font-family="'Montserrat', 'Inter', sans-serif" font-size="10.5" font-weight="bold" text-anchor="middle">Host OS (Chứa chung nhân Kernel)</text>

    <!-- 3. Docker Engine -->
    <rect x="20" y="170" width="300" height="40" rx="6" fill="#0284c7" stroke="#0369a1" stroke-width="1.5"/>
    <text x="170" y="195" fill="#ffffff" font-family="'Montserrat', 'Inter', sans-serif" font-size="10.5" font-weight="bold" text-anchor="middle">Docker Engine (Cô lập cấp tiến trình)</text>

    <!-- 4. Containers -->
    <!-- Container 1 -->
    <g transform="translate(20, 55)">
      <rect width="140" height="105" rx="6" fill="#f8fafc" stroke="#3b82f6" stroke-width="1.5"/>
      <rect width="140" height="25" rx="6" fill="#3b82f6"/>
      <text x="70" y="17" fill="#ffffff" font-family="'Inter', sans-serif" font-size="9.5" font-weight="bold" text-anchor="middle">Container 1 (Apache/PHP)</text>
      
      <!-- Bin/Libs -->
      <rect x="10" y="35" width="120" height="30" rx="4" fill="#93c5fd" stroke="#2563eb" stroke-width="1"/>
      <text x="70" y="53" fill="#1e3a8a" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" text-anchor="middle">Thư viện (Bin/Libs)</text>
      
      <!-- App 1 -->
      <rect x="10" y="72" width="120" height="25" rx="4" fill="#bfdbfe" stroke="#1d4ed8" stroke-width="1"/>
      <text x="70" y="88" fill="#1e3a8a" font-family="'Inter', sans-serif" font-size="9" text-anchor="middle">Ứng dụng A (App)</text>
    </g>

    <!-- Container 2 -->
    <g transform="translate(180, 55)">
      <rect width="140" height="105" rx="6" fill="#f8fafc" stroke="#10b981" stroke-width="1.5"/>
      <rect width="140" height="25" rx="6" fill="#10b981"/>
      <text x="70" y="17" fill="#ffffff" font-family="'Inter', sans-serif" font-size="9.5" font-weight="bold" text-anchor="middle">Container 2 (MySQL DB)</text>
      
      <!-- Bin/Libs -->
      <rect x="10" y="35" width="120" height="30" rx="4" fill="#a7f3d0" stroke="#059669" stroke-width="1"/>
      <text x="70" y="53" fill="#064e3b" font-family="'Inter', sans-serif" font-size="9" font-weight="bold" text-anchor="middle">Thư viện (Bin/Libs)</text>
      
      <!-- App 2 -->
      <rect x="10" y="72" width="120" height="25" rx="4" fill="#d1fae5" stroke="#047857" stroke-width="1"/>
      <text x="70" y="88" fill="#064e3b" font-family="'Inter', sans-serif" font-size="9" text-anchor="middle">Ứng dụng B (App)</text>
    </g>
  </g>
</svg>
