<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    
    <!-- Central Node Gradient -->
    <linearGradient id="center-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>

    <!-- Outer Nodes Gradients -->
    <linearGradient id="node-grad-1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    
    <linearGradient id="node-grad-2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>

    <linearGradient id="node-grad-3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>

    <linearGradient id="node-grad-4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>

    <linearGradient id="node-grad-5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    
    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Canvas Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" rx="16"/>

  <!-- Connecting Lines with Dash Arrays for Animation Feel -->
  <g stroke="#ffffff" stroke-width="2" stroke-opacity="0.2" stroke-dasharray="6,4">
    <line x1="400" y1="250" x2="400" y2="80" />
    <line x1="400" y1="250" x2="650" y2="180" />
    <line x1="400" y1="250" x2="570" y2="380" />
    <line x1="400" y1="250" x2="230" y2="380" />
    <line x1="400" y1="250" x2="150" y2="180" />
  </g>

  <!-- Glowing effect circles at connections -->
  <circle cx="400" cy="80" r="4" fill="#10b981"/>
  <circle cx="650" cy="180" r="4" fill="#06b6d4"/>
  <circle cx="570" cy="380" r="4" fill="#f59e0b"/>
  <circle cx="230" cy="380" r="4" fill="#ec4899"/>
  <circle cx="150" cy="180" r="4" fill="#8b5cf6"/>

  <!-- Central Node -->
  <g filter="url(#shadow)" transform="translate(310, 215)">
    <rect width="180" height="70" rx="12" fill="url(#center-grad)" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="90" y="32" fill="#ffffff" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" text-anchor="middle" letter-spacing="1">MỤC TIÊU</text>
    <text x="90" y="50" fill="#93c5fd" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" text-anchor="middle" letter-spacing="0.5">NGHIÊN CỨU</text>
  </g>

  <!-- Node 1: An Toàn -->
  <g filter="url(#shadow)" transform="translate(300, 40)">
    <rect width="200" height="80" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <!-- Icon Shield -->
    <path d="M 25,25 L 35,20 L 45,25 L 45,35 C 45,42 40,47 35,50 C 30,47 25,42 25,35 Z" fill="none" stroke="#10b981" stroke-width="2"/>
    <text x="60" y="35" fill="#ffffff" font-family="'Inter', sans-serif" font-size="13" font-weight="bold">1. An Toàn &amp; Tin Cậy</text>
    <text x="60" y="55" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="11">Xác thực thẻ sinh viên</text>
  </g>

  <!-- Node 2: Giao Tiếp -->
  <g filter="url(#shadow)" transform="translate(550, 140)">
    <rect width="200" height="80" rx="10" fill="#1e293b" stroke="#06b6d4" stroke-width="2"/>
    <!-- Icon Video Call -->
    <path d="M 23,28 L 35,28 L 35,42 L 23,42 Z M 35,31 L 43,26 L 43,44 L 35,39" fill="none" stroke="#06b6d4" stroke-width="2" stroke-linejoin="round"/>
    <text x="60" y="35" fill="#ffffff" font-family="'Inter', sans-serif" font-size="13" font-weight="bold">2. Giao Tiếp Đa Kênh</text>
    <text x="60" y="55" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="11">Video Call WebRTC &amp; Chat</text>
  </g>

  <!-- Node 3: Quản Lý -->
  <g filter="url(#shadow)" transform="translate(470, 340)">
    <rect width="200" height="80" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <!-- Icon Calendar -->
    <path d="M 24,26 L 44,26 L 44,46 L 24,46 Z M 24,32 L 44,32 M 29,22 L 29,28 M 39,22 L 39,28" fill="none" stroke="#f59e0b" stroke-width="2"/>
    <text x="60" y="35" fill="#ffffff" font-family="'Inter', sans-serif" font-size="13" font-weight="bold">3. Quản Lý Chuyên Nghiệp</text>
    <text x="60" y="55" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="11">Đặt lịch &amp; Đánh giá 2 chiều</text>
  </g>

  <!-- Node 4: Nền Tảng Kỹ Thuật -->
  <g filter="url(#shadow)" transform="translate(130, 340)">
    <rect width="200" height="80" rx="10" fill="#1e293b" stroke="#ec4899" stroke-width="2"/>
    <!-- Icon Tech/Database -->
    <path d="M 23,26 C 23,22 43,22 43,26 L 43,44 C 43,48 23,48 23,44 Z M 23,32 C 23,35 43,35 43,32 M 23,38 C 23,41 43,41 43,38" fill="none" stroke="#ec4899" stroke-width="2"/>
    <text x="60" y="35" fill="#ffffff" font-family="'Inter', sans-serif" font-size="13" font-weight="bold">4. Nền Tảng Kỹ Thuật</text>
    <text x="60" y="55" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="11">PHP, MySQL, Docker, UML</text>
  </g>

  <!-- Node 5: Trợ Lý AI -->
  <g filter="url(#shadow)" transform="translate(50, 140)">
    <rect width="200" height="80" rx="10" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
    <!-- Icon Robot / Chatbot -->
    <path d="M 23,32 A 10,10 0 0,1 43,32 L 43,44 A 2,2 0 0,1 41,46 L 25,46 A 2,2 0 0,1 23,44 Z M 33,22 L 33,26 M 23,37 L 20,37 M 43,37 L 46,37 M 29,35 A 1.5,1.5 0 1,1 29,32 M 37,35 A 1.5,1.5 0 1,1 37,32" fill="none" stroke="#8b5cf6" stroke-width="2"/>
    <text x="60" y="35" fill="#ffffff" font-family="'Inter', sans-serif" font-size="13" font-weight="bold">5. Trợ Lý AI 24/7</text>
    <text x="60" y="55" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="11">Gemini / Hugging Face APIs</text>
  </g>
</svg>
