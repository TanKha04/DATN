<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="red-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <linearGradient id="green-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <!-- Shadow -->
    <filter id="print-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="100%" height="100%" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" rx="16"/>

  <!-- Title -->
  <text x="400" y="45" fill="#0f172a" font-family="'Montserrat', 'Inter', sans-serif" font-size="18" font-weight="800" text-anchor="middle" letter-spacing="0.5">PDO PREPARED STATEMENTS VS SQL INJECTION</text>
  <text x="400" y="65" fill="#475569" font-family="'Inter', sans-serif" font-size="11" font-weight="500" text-anchor="middle">So sánh cơ chế biên dịch câu lệnh bảo mật và lỗ hổng nối chuỗi trực tiếp</text>

  <!-- Splitter Line -->
  <line x1="400" y1="90" x2="400" y2="420" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Left Side: SQL Injection (Direct Concatenation) -->
  <g transform="translate(20, 90)">
    <!-- Column Header -->
    <rect width="350" height="30" rx="6" fill="#fecaca" opacity="0.6"/>
    <text x="175" y="20" fill="#991b1b" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" text-anchor="middle">PHƯƠNG PHÁP NỐI CHUỖI TRỰC TIẾP (VULNERABLE)</text>

    <!-- 1. Input Box -->
    <g filter="url(#print-shadow)" transform="translate(15, 50)">
      <rect width="320" height="60" rx="8" fill="url(#card-bg)" stroke="#ef4444" stroke-width="1.5"/>
      <text x="15" y="20" fill="#ef4444" font-family="'Inter', sans-serif" font-size="10.5" font-weight="bold">Dữ liệu độc hại từ người dùng (User Input):</text>
      <rect x="15" y="28" width="290" height="22" rx="4" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
      <text x="25" y="42" fill="#b91c1c" font-family="'Courier New', monospace" font-size="11" font-weight="bold">' OR '1'='1</text>
    </g>

    <!-- Arrow 1 -->
    <path d="M 175,110 L 175,140" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>
    <text x="190" y="130" fill="#ef4444" font-family="'Inter', sans-serif" font-size="9.5" font-weight="bold">Nối chuỗi thô trực tiếp</text>

    <!-- 2. Statement Box -->
    <g filter="url(#print-shadow)" transform="translate(15, 145)">
      <rect width="320" height="70" rx="8" fill="url(#card-bg)" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="15" y="20" fill="#d97706" font-family="'Inter', sans-serif" font-size="10.5" font-weight="bold">Câu lệnh SQL được gửi lên CSDL:</text>
      <text x="15" y="42" fill="#0f172a" font-family="'Courier New', monospace" font-size="10">SELECT * FROM users WHERE email =</text>
      <!-- highlighted SQL injection part -->
      <rect x="15" y="48" width="290" height="16" fill="#fef3c7"/>
      <text x="20" y="60" fill="#b91c1c" font-family="'Courier New', monospace" font-size="10" font-weight="bold">'' OR '1'='1' LIMIT 1</text>
    </g>

    <!-- Arrow 2 -->
    <path d="M 175,215 L 175,245" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>
    <text x="190" y="235" fill="#ef4444" font-family="'Inter', sans-serif" font-size="9.5" font-weight="bold">Biên dịch cú pháp</text>

    <!-- 3. Result Box -->
    <g filter="url(#print-shadow)" transform="translate(15, 250)">
      <rect width="320" height="85" rx="8" fill="url(#card-bg)" stroke="#b91c1c" stroke-width="2"/>
      <text x="15" y="20" fill="#991b1b" font-family="'Inter', sans-serif" font-size="10.5" font-weight="bold">Kết quả xử lý tại Database Parser:</text>
      <text x="15" y="40" fill="#334155" font-family="'Inter', sans-serif" font-size="9.5">- CSDL biên dịch biểu thức OR '1'='1' là cú pháp logic.</text>
      <text x="15" y="55" fill="#334155" font-family="'Inter', sans-serif" font-size="9.5">- Điều kiện luôn đúng, cho phép vượt qua đăng nhập.</text>
      <text x="15" y="70" fill="#b91c1c" font-family="'Inter', sans-serif" font-size="9.5" font-weight="bold">=&gt; BỊ KHAI THÁC LỖ HỔNG SQL INJECTION</text>
    </g>
  </g>

  <!-- Right Side: Prepared Statements (Parameter Binding) -->
  <g transform="translate(430, 90)">
    <!-- Column Header -->
    <rect width="350" height="30" rx="6" fill="#d1fae5" opacity="0.6"/>
    <text x="175" y="20" fill="#065f46" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" text-anchor="middle">PREPARED STATEMENTS (SECURE)</text>

    <!-- 1. Input Box & Template Prep -->
    <g filter="url(#print-shadow)" transform="translate(15, 50)">
      <rect width="320" height="60" rx="8" fill="url(#card-bg)" stroke="#10b981" stroke-width="1.5"/>
      <text x="15" y="20" fill="#10b981" font-family="'Inter', sans-serif" font-size="10.5" font-weight="bold">B1: Gửi biên dịch trước bộ khung SQL:</text>
      <rect x="15" y="28" width="290" height="22" rx="4" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
      <text x="25" y="42" fill="#047857" font-family="'Courier New', monospace" font-size="10.5" font-weight="bold">SELECT * FROM users WHERE email = <tspan fill="#ea580c" font-weight="bold">?</tspan></text>
    </g>

    <!-- Arrow 1 -->
    <path d="M 175,110 L 175,140" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-green)"/>
    <text x="190" y="130" fill="#047857" font-family="'Inter', sans-serif" font-size="9.5" font-weight="bold">B2: Truyền tham số an toàn</text>

    <!-- 2. Parameter Binding Box -->
    <g filter="url(#print-shadow)" transform="translate(15, 145)">
      <rect width="320" height="70" rx="8" fill="url(#card-bg)" stroke="#0284c7" stroke-width="1.5"/>
      <text x="15" y="20" fill="#0369a1" font-family="'Inter', sans-serif" font-size="10.5" font-weight="bold">Ràng buộc tham số (Parameter Binding):</text>
      <text x="15" y="40" fill="#334155" font-family="'Inter', sans-serif" font-size="9.5">Tham số gửi kèm:</text>
      <text x="105" y="40" fill="#b91c1c" font-family="'Courier New', monospace" font-size="10" font-weight="bold">"' OR '1'='1"</text>
      <text x="15" y="55" fill="#475569" font-family="'Inter', sans-serif" font-size="9.5">CSDL chỉ định dạng giá trị này là chuỗi thô,</text>
      <text x="15" y="65" fill="#475569" font-family="'Inter', sans-serif" font-size="9.5">không thể làm thay đổi cấu trúc câu lệnh SQL.</text>
    </g>

    <!-- Arrow 2 -->
    <path d="M 175,215 L 175,245" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-green)"/>
    <text x="190" y="235" fill="#047857" font-family="'Inter', sans-serif" font-size="9.5" font-weight="bold">Thực thi an toàn</text>

    <!-- 3. Safe Result Box -->
    <g filter="url(#print-shadow)" transform="translate(15, 250)">
      <rect width="320" height="85" rx="8" fill="url(#card-bg)" stroke="#047857" stroke-width="2"/>
      <text x="15" y="20" fill="#065f46" font-family="'Inter', sans-serif" font-size="10.5" font-weight="bold">Kết quả xử lý tại Database Parser:</text>
      <text x="15" y="40" fill="#334155" font-family="'Inter', sans-serif" font-size="9.5">- CSDL tìm kiếm user có email đúng bằng chuỗi thô.</text>
      <text x="15" y="55" fill="#334155" font-family="'Inter', sans-serif" font-size="9.5">- Trả về rỗng (0 kết quả), bảo vệ tài khoản thành công.</text>
      <text x="15" y="70" fill="#047857" font-family="'Inter', sans-serif" font-size="9.5" font-weight="bold">=&gt; AN TOÀN TUYỆT ĐỐI TRƯỚC TẤN CÔNG</text>
    </g>
  </g>

  <!-- Markers Definitions -->
  <defs>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 2 L 5 5 L 0 8 z" fill="#ef4444"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 2 L 5 5 L 0 8 z" fill="#10b981"/>
    </marker>
  </defs>
</svg>
