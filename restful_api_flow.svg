<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Card Background -->
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    
    <!-- Shadow Filter -->
    <filter id="print-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="100%" height="100%" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" rx="16"/>

  <!-- Grid Pattern -->
  <g opacity="0.02" stroke="#000000" stroke-width="1">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none"/>
    </pattern>
    <rect width="100%" height="100%" fill="url(#grid)" rx="16"/>
  </g>

  <!-- Title -->
  <text x="400" y="45" fill="#0f172a" font-family="'Montserrat', 'Inter', sans-serif" font-size="18" font-weight="800" text-anchor="middle" letter-spacing="0.5">QUY TRÌNH GIAO TIẾP RESTFUL API &amp; KIỂM THỬ POSTMAN</text>
  <text x="400" y="65" fill="#475569" font-family="'Inter', sans-serif" font-size="11" font-weight="500" text-anchor="middle">Yêu cầu HTTP CRUD và định dạng phản hồi dữ liệu JSON</text>

  <!-- Flow Lines -->
  <!-- Upper: Request -->
  <path d="M 280,180 L 520,180" stroke="#0284c7" stroke-width="2.5" marker-end="url(#arrow-cyan)" stroke-dasharray="6,4"/>
  <text x="400" y="153" fill="#0369a1" font-family="'Montserrat', 'Inter', sans-serif" font-weight="bold" font-size="10.5" text-anchor="middle">HTTP REQUEST (CRUD)</text>
  <text x="400" y="172" fill="#0f172a" font-family="'Courier New', monospace" font-size="10" text-anchor="middle">GET / POST / PUT / DELETE /api/appointments</text>

  <!-- Lower: Response -->
  <path d="M 520,280 L 280,280" stroke="#db2777" stroke-width="2.5" marker-end="url(#arrow-pink)" stroke-dasharray="6,4"/>
  <text x="400" y="270" fill="#be185d" font-family="'Montserrat', 'Inter', sans-serif" font-weight="bold" font-size="10.5" text-anchor="middle">JSON RESPONSE (BODY + STATUS)</text>
  <text x="400" y="297" fill="#15803d" font-family="'Courier New', monospace" font-size="10" text-anchor="middle">{"status":"success","code":200,"data":{...}}</text>

  <!-- Markers -->
  <svg>
    <defs>
      <marker id="arrow-cyan" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 2 L 5 5 L 0 8 z" fill="#0284c7"/>
      </marker>
      <marker id="arrow-pink" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 2 L 5 5 L 0 8 z" fill="#db2777"/>
      </marker>
    </defs>
  </svg>

  <!-- Left Card: Client (Browser / Postman) -->
  <g filter="url(#print-shadow)" transform="translate(40, 110)">
    <rect width="240" height="220" rx="14" fill="url(#card-bg)" stroke="#0284c7" stroke-width="2"/>
    <rect width="240" height="38" rx="14" fill="#0284c7" opacity="0.05"/>
    
    <!-- Icon Rocket -->
    <path d="M 23,28 L 30,16 L 37,28 Z M 30,22 L 30,28" stroke="#0284c7" stroke-width="1.5" stroke-linejoin="round"/>
    
    <text x="48" y="24" fill="#0369a1" font-family="'Montserrat', 'Inter', sans-serif" font-size="11.5" font-weight="800">CLIENT / POSTMAN TESTER</text>
    
    <text x="15" y="65" fill="#0f172a" font-family="'Inter', sans-serif" font-size="11" font-weight="700">Chức năng &amp; Hoạt động:</text>
    <text x="15" y="85" fill="#334155" font-family="'Inter', sans-serif" font-size="10.5">- Thiết lập request URL và Header</text>
    <text x="15" y="105" fill="#334155" font-family="'Inter', sans-serif" font-size="10.5">- Đính kèm Body dữ liệu JSON</text>
    <text x="15" y="125" fill="#334155" font-family="'Inter', sans-serif" font-size="10.5">- Quản lý biến Environment/Global</text>
    
    <text x="15" y="160" fill="#0f172a" font-family="'Inter', sans-serif" font-size="11" font-weight="700">API testing mục tiêu:</text>
    <text x="15" y="180" fill="#334155" font-family="'Inter', sans-serif" font-size="10.5">- Đo lường thời gian phản hồi (ms)</text>
    <text x="15" y="200" fill="#334155" font-family="'Inter', sans-serif" font-size="10.5">- Kiểm thử tự động mã lỗi (200, 401...)</text>
  </g>

  <!-- Right Card: API Server (PHP API Endpoints) -->
  <g filter="url(#print-shadow)" transform="translate(520, 110)">
    <rect width="240" height="220" rx="14" fill="url(#card-bg)" stroke="#db2777" stroke-width="2"/>
    <rect width="240" height="38" rx="14" fill="#db2777" opacity="0.05"/>
    
    <!-- Icon API code -->
    <path d="M 18,22 L 23,26 L 18,30 M 34,22 L 29,26 L 34,30" stroke="#db2777" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    
    <text x="48" y="24" fill="#be185d" font-family="'Montserrat', 'Inter', sans-serif" font-size="11.5" font-weight="800">RESTFUL API ENDPOINTS</text>
    
    <text x="15" y="65" fill="#0f172a" font-family="'Inter', sans-serif" font-size="11" font-weight="700">Chức năng &amp; Hoạt động:</text>
    <text x="15" y="85" fill="#334155" font-family="'Inter', sans-serif" font-size="10.5">- Tiếp nhận HTTP Request (GET/POST...)</text>
    <text x="15" y="105" fill="#334155" font-family="'Inter', sans-serif" font-size="10.5">- Kiểm duyệt Session và phân quyền</text>
    <text x="15" y="125" fill="#334155" font-family="'Inter', sans-serif" font-size="10.5">- Xử lý logic và truy vấn database</text>
    
    <text x="15" y="160" fill="#0f172a" font-family="'Inter', sans-serif" font-size="11" font-weight="700">Dữ liệu trả về (JSON):</text>
    <text x="15" y="180" fill="#334155" font-family="'Inter', sans-serif" font-size="10.5">- Status: success / error / fail</text>
    <text x="15" y="200" fill="#334155" font-family="'Inter', sans-serif" font-size="10.5">- Code: 200 (OK), 201 (Created), 400...</text>
  </g>
</svg>
