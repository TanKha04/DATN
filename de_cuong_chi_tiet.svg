  <!-- ====== HEADER ====== -->
  <text x="70" y="45" font-size="11" font-weight="bold">TRƯỜNG KỸ THUẬT VÀ CÔNG NGHỆ</text>
  <text x="70" y="62" font-size="11" font-weight="bold">KHOA CÔNG NGHỆ THÔNG TIN</text>

  <text x="480" y="45" font-size="12" font-weight="bold">CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAM</text>
  <text x="540" y="62" font-size="11" font-style="italic">Độc lập – Tự do – Hạnh phúc</text>
  <line x1="510" y1="67" x2="710" y2="67" stroke="#000" stroke-width="0.8"/>

  <!-- ====== TITLE ====== -->
  <text x="300" y="100" font-size="15" font-weight="bold" text-anchor="middle">ĐỀ CƯƠNG CHI TIẾT</text>
  <text x="300" y="120" font-size="14" font-weight="bold" text-anchor="middle">ĐỒ ÁN TỐT NGHIỆP NGÀNH CÔNG NGHỆ THÔNG TIN</text>

  <!-- ====== STUDENT INFO ====== -->
  <text x="70" y="150" font-size="12">Họ tên sinh viên: <tspan font-weight="bold">Trầm Tấn Khả</tspan>  MSSV: <tspan font-weight="bold">110122026</tspan></text>
  <text x="70" y="170" font-size="12">Lớp: <tspan font-weight="bold">DA22TTD</tspan> Khóa: <tspan font-weight="bold">2022</tspan></text>
  <text x="70" y="190" font-size="12">Tên đề tài: Kết nối sinh viên ngành y với người có nhu cầu chăm sóc sức khỏe tại nhà</text>

  <!-- ====== 1. MỤC TIÊU ====== -->
  <text x="70" y="220" font-size="12" font-weight="bold">1. Mục tiêu của đề tài:</text>
  <text x="90" y="238" font-size="11">- Xây dựng nền tảng web kết nối sinh viên y khoa với người dân có nhu cầu chăm sóc sức khỏe tại nhà.</text>
  <text x="90" y="254" font-size="11">- Tạo môi trường an toàn, minh bạch để bệnh nhân tìm hỗ trợ y tế và sinh viên tìm cơ hội thực hành lâm sàng.</text>
  <text x="90" y="270" font-size="11">- Tích hợp trí tuệ nhân tạo (AI) hỗ trợ tư vấn sức khỏe sơ bộ và gợi ý sinh viên phù hợp.</text>
  <text x="90" y="286" font-size="11">- Xây dựng hệ thống xác minh danh tính sinh viên đảm bảo độ tin cậy cho người sử dụng.</text>

  <!-- ====== 2. NỘI DUNG ====== -->
  <text x="70" y="310" font-size="12" font-weight="bold">2. Nội dung thực hiện:</text>
  <text x="90" y="328" font-size="11">- Phân tích yêu cầu hệ thống với 3 vai trò: Bệnh nhân, Sinh viên Y khoa, Quản trị viên.</text>
  <text x="90" y="344" font-size="11">- Thiết kế cơ sở dữ liệu MySQL (16 bảng: users, posts, messages, ratings, verifications, ...).</text>
  <text x="90" y="360" font-size="11">- Xây dựng các module: đăng ký/đăng nhập, đăng tin tuyển dụng/ứng tuyển, tin nhắn, gọi video WebRTC.</text>
  <text x="90" y="376" font-size="11">- Tích hợp Trợ lý AI (Google Gemini): tư vấn sức khỏe, kiểm tra triệu chứng, tìm sinh viên phù hợp.</text>
  <text x="90" y="392" font-size="11">- Xây dựng hệ thống xác minh sinh viên, đánh giá, kết bạn, thông báo, bảng xếp hạng.</text>
  <text x="90" y="408" font-size="11">- Xây dựng trang quản trị viên: quản lý người dùng, bài đăng, xác minh, báo cáo vi phạm.</text>

  <!-- ====== 3. PHƯƠNG PHÁP ====== -->
  <text x="70" y="432" font-size="12" font-weight="bold">3. Phương pháp thực hiện:</text>
  <text x="90" y="450" font-size="11">- Nghiên cứu tài liệu về PHP, MySQL, Bootstrap, REST API, WebRTC, Google Gemini AI.</text>
  <text x="90" y="466" font-size="11">- Phân tích thiết kế hệ thống bằng UML: Use Case Diagram, ERD, Class Diagram.</text>
  <text x="90" y="482" font-size="11">- Phát triển theo mô hình Agile, kiểm thử API bằng Postman, triển khai bằng Docker.</text>

  <!-- ====== 4. BỐ CỤC ====== -->
  <text x="70" y="506" font-size="12" font-weight="bold">4. Bố cục đề tài:</text>

  <text x="110" y="528" font-size="12" font-style="italic">Chương 1: Tổng quan đề tài</text>
  <text x="130" y="544" font-size="11">Giới thiệu bối cảnh thực tiễn, lý do chọn đề tài, mục tiêu, phạm vi nghiên cứu,</text>
  <text x="130" y="558" font-size="11">ý nghĩa khoa học và thực tiễn của đề tài.</text>

  <text x="110" y="580" font-size="12" font-style="italic">Chương 2: Cơ sở lý thuyết</text>
  <text x="130" y="596" font-size="11">Trình bày lý thuyết về PHP, MySQL, Bootstrap 5, REST API, WebRTC (gọi video P2P),</text>
  <text x="130" y="610" font-size="11">Google Gemini AI API, xác thực email SMTP, OAuth (Facebook Login), Docker.</text>

  <text x="110" y="632" font-size="12" font-style="italic">Chương 3: Phân tích và thiết kế hệ thống</text>
  <text x="130" y="648" font-size="11">Phân tích yêu cầu chức năng và phi chức năng. Thiết kế Use Case Diagram cho 3 actor.</text>
  <text x="130" y="662" font-size="11">Thiết kế ERD (16 bảng), Class Diagram, thiết kế giao diện người dùng (wireframe).</text>

  <text x="110" y="684" font-size="12" font-style="italic">Chương 4: Xây dựng và triển khai</text>
  <text x="130" y="700" font-size="11">Cài đặt môi trường, xây dựng các module: đăng ký/đăng nhập, bài đăng, tin nhắn,</text>
  <text x="130" y="714" font-size="11">gọi video WebRTC, trợ lý AI Gemini, xác minh sinh viên, dashboard. Triển khai hosting.</text>

  <text x="110" y="736" font-size="12" font-style="italic">Chương 5: Thực nghiệm và đánh giá</text>
  <text x="130" y="752" font-size="11">Kiểm thử các chức năng chính, kiểm thử API bằng Postman. Đánh giá hiệu suất, bảo mật.</text>
  <text x="130" y="766" font-size="11">So sánh với các giải pháp tương tự, khảo sát trải nghiệm người dùng.</text>

  <text x="110" y="788" font-size="12" font-style="italic">Chương 6: Kết luận và hướng phát triển</text>
  <text x="130" y="804" font-size="11">Tổng kết kết quả đạt được, hạn chế còn tồn tại. Đề xuất hướng phát triển: tích hợp thanh toán,</text>
  <text x="130" y="818" font-size="11">ứng dụng mobile, nâng cấp AI, lịch hẹn tự động, mở rộng phạm vi địa lý.</text>

  <!-- ====== 5. TÀI LIỆU ====== -->
  <text x="70" y="848" font-size="12" font-weight="bold">5. Tài liệu tham khảo:</text>
  <text x="90" y="866" font-size="11">[1] PHP Documentation - https://www.php.net/docs.php</text>
  <text x="90" y="882" font-size="11">[2] MySQL 8.0 Reference Manual - https://dev.mysql.com/doc/refman/8.0/en/</text>
  <text x="90" y="898" font-size="11">[3] Bootstrap 5 Documentation - https://getbootstrap.com/docs/5.3/</text>
  <text x="90" y="914" font-size="11">[4] WebRTC API - MDN Web Docs - https://developer.mozilla.org/en-US/docs/Web/API/WebRTC_API</text>
  <text x="90" y="930" font-size="11">[5] Google Gemini AI API - https://ai.google.dev/docs</text>
  <text x="90" y="946" font-size="11">[6] Docker Documentation - https://docs.docker.com/</text>
  <text x="90" y="962" font-size="11">[7] RESTful API Design Best Practices - https://restfulapi.net/</text>
  <text x="90" y="978" font-size="11">[8] PHPMailer - https://github.com/PHPMailer/PHPMailer</text>

  <!-- ====== 6. KẾ HOẠCH ====== -->
  <text x="70" y="1008" font-size="12" font-weight="bold">6. Kế hoạch thực hiện đề tài:</text>

