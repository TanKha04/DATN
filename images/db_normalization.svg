<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Card Background -->
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    
    <!-- Shadow Filter -->
    <filter id="print-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="100%" height="100%" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" rx="16"/>

  <!-- Title -->
  <text x="400" y="45" fill="#0f172a" font-family="'Montserrat', 'Inter', sans-serif" font-size="18" font-weight="800" text-anchor="middle" letter-spacing="0.5">TIẾN TRÌNH CHUẨN HÓA CƠ SỞ DỮ LIỆU PHÂN TÍCH (NORMALIZATION)</text>
  <text x="400" y="65" fill="#475569" font-family="'Inter', sans-serif" font-size="11" font-weight="500" text-anchor="middle">Quy trình biến đổi cấu trúc bảng từ dạng chưa chuẩn hóa (UNF) sang Dạng chuẩn 3 (3NF)</text>

  <!-- Flow Arrows (Horizontal) -->
  <!-- UNF to 1NF -->
  <path d="M 195,210 L 225,210" stroke="#0ea5e9" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  
  <!-- 1NF to 2NF -->
  <path d="M 385,210 L 415,210" stroke="#0ea5e9" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  
  <!-- 2NF to 3NF -->
  <path d="M 575,210 L 605,210" stroke="#10b981" stroke-width="2.5" marker-end="url(#arrow-green)"/>

  <!-- Box 1: UNF (Unnormalized Form) -->
  <g filter="url(#print-shadow)" transform="translate(30, 110)">
    <rect width="160" height="240" rx="12" fill="url(#card-bg)" stroke="#94a3b8" stroke-width="2"/>
    <rect width="160" height="35" rx="12" fill="#94a3b8" opacity="0.1"/>
    <text x="80" y="22" fill="#475569" font-family="'Montserrat', 'Inter', sans-serif" font-size="11.5" font-weight="800" text-anchor="middle">CHƯA CHUẨN HÓA (UNF)</text>
    
    <text x="12" y="65" fill="#0f172a" font-family="'Inter', sans-serif" font-size="10.5" font-weight="bold">Đặc trưng bảng:</text>
    <text x="12" y="85" fill="#475569" font-family="'Inter', sans-serif" font-size="9.5">- Chứa nhóm lặp</text>
    <text x="12" y="100" fill="#475569" font-family="'Inter', sans-serif" font-size="9.5">- Thuộc tính đa trị</text>
    <text x="12" y="115" fill="#475569" font-family="'Inter', sans-serif" font-size="9.5">- Dữ liệu hỗn tạp</text>
    
    <rect x="10" y="145" width="140" height="80" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="80" y="165" fill="#ef4444" font-family="'Inter', sans-serif" font-size="9.5" font-weight="bold" text-anchor="middle">Dị thường dữ liệu:</text>
    <text x="15" y="185" fill="#64748b" font-family="'Inter', sans-serif" font-size="8.5">- Dư thừa thông tin lớn</text>
    <text x="15" y="200" fill="#64748b" font-family="'Inter', sans-serif" font-size="8.5">- Dễ sai sót khi UPDATE</text>
    <text x="15" y="215" fill="#64748b" font-family="'Inter', sans-serif" font-size="8.5">- Mất thông tin khi DELETE</text>
  </g>

  <!-- Box 2: 1NF (First Normal Form) -->
  <g filter="url(#print-shadow)" transform="translate(220, 110)">
    <rect width="160" height="240" rx="12" fill="url(#card-bg)" stroke="#0ea5e9" stroke-width="2"/>
    <rect width="160" height="35" rx="12" fill="#0ea5e9" opacity="0.05"/>
    <text x="80" y="22" fill="#0284c7" font-family="'Montserrat', 'Inter', sans-serif" font-size="11.5" font-weight="800" text-anchor="middle">DẠNG CHUẨN 1 (1NF)</text>
    
    <rect x="10" y="47" width="140" height="50" rx="4" fill="#e0f2fe" stroke="#bae6fd"/>
    <text x="80" y="62" fill="#0369a1" font-family="'Inter', sans-serif" font-size="8.5" font-weight="bold" text-anchor="middle">ĐIỀU KIỆN ĐẠT ĐƯỢC:</text>
    <text x="15" y="77" fill="#0369a1" font-family="'Inter', sans-serif" font-size="8.5" text-anchor="start">Loại bỏ thuộc tính đa trị</text>
    <text x="15" y="90" fill="#0369a1" font-family="'Inter', sans-serif" font-size="8.5" text-anchor="start">&amp; các nhóm lặp lại.</text>

    <text x="12" y="120" fill="#0f172a" font-family="'Inter', sans-serif" font-size="10.5" font-weight="bold">Đặc trưng:</text>
    <text x="12" y="140" fill="#334155" font-family="'Inter', sans-serif" font-size="9.5">- Giá trị các cột đều là</text>
    <text x="12" y="155" fill="#0ea5e9" font-family="'Inter', sans-serif" font-size="9.5" font-weight="bold">nguyên tố (Atomic Value)</text>
    <text x="12" y="170" fill="#334155" font-family="'Inter', sans-serif" font-size="9.5">- Đã xác định khóa chính</text>
    
    <text x="12" y="200" fill="#dc2626" font-family="'Inter', sans-serif" font-size="9" font-weight="bold">Tồn tại:</text>
    <text x="12" y="215" fill="#64748b" font-family="'Inter', sans-serif" font-size="8.5">- Phụ thuộc hàm bộ phận</text>
    <text x="12" y="230" fill="#64748b" font-family="'Inter', sans-serif" font-size="8.5">vào khóa chính ghép.</text>
  </g>

  <!-- Box 3: 2NF (Second Normal Form) -->
  <g filter="url(#print-shadow)" transform="translate(410, 110)">
    <rect width="160" height="240" rx="12" fill="url(#card-bg)" stroke="#3b82f6" stroke-width="2"/>
    <rect width="160" height="35" rx="12" fill="#3b82f6" opacity="0.05"/>
    <text x="80" y="22" fill="#2563eb" font-family="'Montserrat', 'Inter', sans-serif" font-size="11.5" font-weight="800" text-anchor="middle">DẠNG CHUẨN 2 (2NF)</text>
    
    <rect x="10" y="47" width="140" height="50" rx="4" fill="#dbeafe" stroke="#bfdbfe"/>
    <text x="80" y="62" fill="#1e40af" font-family="'Inter', sans-serif" font-size="8.5" font-weight="bold" text-anchor="middle">ĐIỀU KIỆN ĐẠT ĐƯỢC:</text>
    <text x="15" y="77" fill="#1e40af" font-family="'Inter', sans-serif" font-size="8.5" text-anchor="start">Đạt 1NF + Loại bỏ phụ</text>
    <text x="15" y="90" fill="#1e40af" font-family="'Inter', sans-serif" font-size="8.5" text-anchor="start">thuộc hàm bộ phận.</text>

    <text x="12" y="120" fill="#0f172a" font-family="'Inter', sans-serif" font-size="10.5" font-weight="bold">Đặc trưng:</text>
    <text x="12" y="140" fill="#334155" font-family="'Inter', sans-serif" font-size="9.5">- Các cột không khóa phải</text>
    <text x="12" y="155" fill="#3b82f6" font-family="'Inter', sans-serif" font-size="9.5" font-weight="bold">phụ thuộc hàm đầy đủ</text>
    <text x="12" y="170" fill="#334155" font-family="'Inter', sans-serif" font-size="9.5">vào toàn bộ khóa chính.</text>
    
    <text x="12" y="200" fill="#dc2626" font-family="'Inter', sans-serif" font-size="9" font-weight="bold">Tồn tại:</text>
    <text x="12" y="215" fill="#64748b" font-family="'Inter', sans-serif" font-size="8.5">- Phụ thuộc hàm bắc cầu</text>
    <text x="12" y="230" fill="#64748b" font-family="'Inter', sans-serif" font-size="8.5">giữa các thuộc tính phụ.</text>
  </g>

  <!-- Box 4: 3NF (Third Normal Form) -->
  <g filter="url(#print-shadow)" transform="translate(600, 110)">
    <rect width="160" height="240" rx="12" fill="url(#card-bg)" stroke="#10b981" stroke-width="2"/>
    <rect width="160" height="35" rx="12" fill="#10b981" opacity="0.05"/>
    <text x="80" y="22" fill="#059669" font-family="'Montserrat', 'Inter', sans-serif" font-size="11.5" font-weight="800" text-anchor="middle">DẠNG CHUẨN 3 (3NF)</text>
    
    <rect x="10" y="47" width="140" height="50" rx="4" fill="#d1fae5" stroke="#a7f3d0"/>
    <text x="80" y="62" fill="#065f46" font-family="'Inter', sans-serif" font-size="8.5" font-weight="bold" text-anchor="middle">ĐIỀU KIỆN ĐẠT ĐƯỢC:</text>
    <text x="15" y="77" fill="#065f46" font-family="'Inter', sans-serif" font-size="8.5" text-anchor="start">Đạt 2NF + Loại bỏ phụ</text>
    <text x="15" y="90" fill="#065f46" font-family="'Inter', sans-serif" font-size="8.5" text-anchor="start">thuộc hàm bắc cầu.</text>

    <text x="12" y="120" fill="#0f172a" font-family="'Inter', sans-serif" font-size="10.5" font-weight="bold">Đặc trưng:</text>
    <text x="12" y="140" fill="#334155" font-family="'Inter', sans-serif" font-size="9.5">- Không cột không khóa nào</text>
    <text x="12" y="155" fill="#10b981" font-family="'Inter', sans-serif" font-size="9.5" font-weight="bold">phụ thuộc bắc cầu</text>
    <text x="12" y="170" fill="#334155" font-family="'Inter', sans-serif" font-size="9.5">vào khóa chính.</text>
    
    <rect x="10" y="195" width="140" height="35" rx="4" fill="#ecfdf5"/>
    <text x="80" y="217" fill="#047857" font-family="'Inter', sans-serif" font-size="9.5" font-weight="bold" text-anchor="middle">TỐI ƯU CƠ SỞ DỮ LIỆU</text>
  </g>

  <!-- Arrow Markers -->
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 2 L 5 5 L 0 8 z" fill="#0ea5e9"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 2 L 5 5 L 0 8 z" fill="#10b981"/>
    </marker>
  </defs>
</svg>
