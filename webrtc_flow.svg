<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Card Background -->
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    
    <!-- Shadow Filter -->
    <filter id="print-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="100%" height="100%" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" rx="16"/>

  <!-- Grid Pattern -->
  <g opacity="0.02" stroke="#000000" stroke-width="1">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none"/>
    </pattern>
    <rect width="100%" height="100%" fill="url(#grid)" rx="16"/>
  </g>

  <!-- Title -->
  <text x="400" y="45" fill="#0f172a" font-family="'Montserrat', 'Inter', sans-serif" font-size="18" font-weight="800" text-anchor="middle" letter-spacing="0.5">QUY TRÌNH KẾT NỐI CUỘC GỌI VIDEO CALL WEBRTC</text>
  <text x="400" y="65" fill="#475569" font-family="'Inter', sans-serif" font-size="11" font-weight="500" text-anchor="middle">Hai giai đoạn: Truyền tín hiệu (Signaling) và Kết nối truyền thông trực tiếp (P2P Stream)</text>

  <!-- Signaling Paths (Dotted lines) -->
  <path d="M 150,220 L 320,130" stroke="#d97706" stroke-width="1.5" stroke-dasharray="5,3" fill="none"/>
  <text x="220" y="152" fill="#b45309" font-family="'Inter', sans-serif" font-size="9" font-weight="bold">1. SDP Offer / Candidates</text>

  <path d="M 480,130 L 650,220" stroke="#d97706" stroke-width="1.5" stroke-dasharray="5,3" fill="none"/>
  <text x="495" y="152" fill="#b45309" font-family="'Inter', sans-serif" font-size="9" font-weight="bold">2. SDP Answer / Candidates</text>

  <!-- Direct P2P Media Stream Connection (Thick Red/Orange Line) -->
  <path d="M 230,290 L 570,290" stroke="#ea580c" stroke-width="4" fill="none"/>
  
  <rect x="330" y="275" width="140" height="30" rx="15" fill="#f8fafc" stroke="#ea580c" stroke-width="1.5"/>
  <text x="400" y="294" fill="#c2410c" font-family="'Montserrat', 'Inter', sans-serif" font-size="9.5" font-weight="800" text-anchor="middle" letter-spacing="0.5">3. P2P AUDIO / VIDEO STREAM</text>

  <!-- Box 1: Patient (Peer A) -->
  <g filter="url(#print-shadow)" transform="translate(50, 180)">
    <rect width="180" height="180" rx="14" fill="url(#card-bg)" stroke="#0284c7" stroke-width="2"/>
    <rect width="180" height="32" rx="14" fill="#0284c7" opacity="0.05"/>
    <text x="15" y="20" fill="#0369a1" font-family="'Montserrat', 'Inter', sans-serif" font-size="11" font-weight="800">PATIENT (PEER A)</text>
    
    <text x="15" y="60" fill="#0f172a" font-family="'Inter', sans-serif" font-size="10.5" font-weight="700">Thiết bị &amp; Trình duyệt:</text>
    <text x="15" y="80" fill="#334155" font-family="'Inter', sans-serif" font-size="10">- Khởi tạo RTCPeerConnection</text>
    <text x="15" y="100" fill="#334155" font-family="'Inter', sans-serif" font-size="10">- Mở Camera/Microphone</text>
    <text x="15" y="120" fill="#334155" font-family="'Inter', sans-serif" font-size="10">- Tạo SDP Offer (Yêu cầu)</text>
    <text x="15" y="140" fill="#334155" font-family="'Inter', sans-serif" font-size="10">- Thu thập địa chỉ ICE</text>
  </g>

  <!-- Box 2: Student (Peer B) -->
  <g filter="url(#print-shadow)" transform="translate(570, 180)">
    <rect width="180" height="180" rx="14" fill="url(#card-bg)" stroke="#7c3aed" stroke-width="2"/>
    <rect width="180" height="32" rx="14" fill="#7c3aed" opacity="0.05"/>
    <text x="15" y="20" fill="#6d28d9" font-family="'Montserrat', 'Inter', sans-serif" font-size="11" font-weight="800">STUDENT (PEER B)</text>
    
    <text x="15" y="60" fill="#0f172a" font-family="'Inter', sans-serif" font-size="10.5" font-weight="700">Thiết bị &amp; Trình duyệt:</text>
    <text x="15" y="80" fill="#334155" font-family="'Inter', sans-serif" font-size="10">- Nhận SDP Offer từ Server</text>
    <text x="15" y="100" fill="#334155" font-family="'Inter', sans-serif" font-size="10">- Tạo SDP Answer (Trả lời)</text>
    <text x="15" y="120" fill="#334155" font-family="'Inter', sans-serif" font-size="10">- Chia sẻ dòng Media cục bộ</text>
    <text x="15" y="140" fill="#334155" font-family="'Inter', sans-serif" font-size="10">- Thiết lập liên kết P2P</text>
  </g>

  <!-- Top Center Box: Signaling Server (PHP Backend) -->
  <g filter="url(#print-shadow)" transform="translate(310, 80)">
    <rect width="180" height="80" rx="12" fill="url(#card-bg)" stroke="#d97706" stroke-width="1.5"/>
    <rect width="180" height="25" rx="12" fill="#d97706" opacity="0.05"/>
    <text x="90" y="17" fill="#b45309" font-family="'Montserrat', 'Inter', sans-serif" font-size="9.5" font-weight="800" text-anchor="middle">SIGNALING SERVER (PHP)</text>
    
    <text x="90" y="45" fill="#475569" font-family="'Inter', sans-serif" font-size="9.5" text-anchor="middle">- Nhận diện và định tuyến SDP</text>
    <text x="90" y="62" fill="#475569" font-family="'Inter', sans-serif" font-size="9.5" text-anchor="middle">- Trung chuyển ICE Candidates</text>
  </g>
</svg>
